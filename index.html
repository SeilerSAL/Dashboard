<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schaubühne — Ticketing Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
  :root {
    --bg:#f8f8fa;--surface:#ffffff;--surface-2:#f0f0f4;--surface-3:#e6e6ee;
    --border:#d8d8e2;--border-light:#c8c8d4;
    --text:#1a1a2e;--text-muted:#5a5a72;--text-dim:#8a8aa0;
    --accent:#8b6914;--accent-hover:#a47d1c;--accent-dim:rgba(139,105,20,0.08);
    --green:#16a34a;--green-bg:rgba(22,163,74,0.06);
    --red:#dc2626;--red-bg:rgba(220,38,38,0.06);
    --yellow:#b45309;--yellow-bg:rgba(180,83,9,0.06);
    --blue:#2563eb;--blue-bg:rgba(37,99,235,0.06);
    --font:'DM Sans',-apple-system,sans-serif;--mono:Arial,Helvetica,sans-serif;
    --radius:6px;--radius-lg:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:linear-gradient(180deg,rgba(139,105,20,0.03)0%,transparent 100%)}
  .header h1{font-size:18px;font-weight:600;letter-spacing:-0.03em}.header h1 .sep{color:var(--border-light);margin:0 4px;font-weight:300}.header h1 .sub{color:var(--accent);font-weight:400;font-size:15px}
  .header-meta{font-size:11px;color:var(--text-dim);font-family:var(--mono);letter-spacing:0.02em}
  .btn{padding:6px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-muted);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s}.btn:hover{border-color:var(--border-light);color:var(--text)}
  .tabs{display:flex;gap:0;padding:0 28px;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
  .tab{padding:11px 18px;font-size:12.5px;font-weight:500;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none;white-space:nowrap}.tab:hover{color:var(--text-muted)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}.tab.l2{display:none}.tab.l2.unlocked{display:block}
  .main{padding:20px 28px 40px;max-width:1600px}.panel{display:none}.panel.active{display:block}
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;margin-bottom:12px}
  .kpi-row-hero{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:10px}
  .kpi-row-secondary{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:6px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;transition:border-color .2s}.kpi:hover{border-color:var(--border-light)}
  .kpi-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px;position:relative;overflow:hidden;transition:border-color .2s}
  .kpi-hero:hover{border-color:var(--border-light)}
  .kpi-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
  .kpi-hero.h-accent::before{background:var(--accent)}.kpi-hero.h-green::before{background:var(--green)}.kpi-hero.h-blue::before{background:var(--blue)}
  /* Sparkline (Tagesverkauf Hero KPI) */
  .sparkline-wrap{margin-top:10px;display:flex;align-items:flex-end;gap:2px;height:28px}
  .spark-bar{flex:1;border-radius:2px 2px 0 0;background:rgba(22,163,74,0.2);transition:background .15s;min-width:0}
  .spark-bar.today{background:var(--green)}
  .spark-bar.zero{background:rgba(22,163,74,0.08)}
  .kpi-trend-row{display:flex;align-items:center;gap:8px;margin-top:5px;font-size:11px;font-family:var(--mono)}
  .trend-pip{display:inline-flex;align-items:center;gap:2px;color:var(--text-dim)}
  .trend-pip strong{font-weight:600;color:var(--text)}
  .trend-arrow{font-size:15px;font-weight:700;line-height:1;margin-right:3px}
  .trend-up{color:var(--green)}.trend-dn{color:var(--red)}.trend-neu{color:var(--text-dim)}
  .kpi-hero .kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:8px;font-weight:600}
  .kpi-hero .kpi-val{font-size:32px;font-weight:700;font-family:var(--mono);letter-spacing:-0.04em;line-height:1.1}
  .kpi-hero .kpi-sub{font-size:12px;color:var(--text-dim);margin-top:6px;font-family:var(--mono)}
  .kpi-sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;transition:border-color .2s}.kpi-sec:hover{border-color:var(--border-light)}
  .kpi-sec .kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:3px;font-weight:500}
  .kpi-sec .kpi-val{font-size:18px;font-weight:600;font-family:var(--mono);letter-spacing:-0.03em;line-height:1.1}
  .kpi-sec .kpi-sub{font-size:10px;color:var(--text-dim);margin-top:2px;font-family:var(--mono)}
  .kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:5px;font-weight:500}
  .kpi-val{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:-0.04em;line-height:1.1}
  .kpi-sub{font-size:11px;color:var(--text-dim);margin-top:3px;font-family:var(--mono)}
  .color-legend{display:flex;gap:14px;align-items:center;padding:8px 0 14px;flex-wrap:wrap}
  .color-legend-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text-muted)}
  .color-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .c-accent{color:var(--accent)}.c-green{color:var(--green)}.c-red{color:var(--red)}.c-yellow{color:var(--yellow)}.c-blue{color:var(--blue)}.c-muted{color:var(--text-muted)}
  .alerts{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
  .alert{padding:9px 14px;border-radius:var(--radius);font-size:12.5px;display:flex;align-items:center;gap:8px;line-height:1.4}
  .alert-danger{background:var(--red-bg);border:1px solid rgba(248,113,113,0.2);color:var(--red)}.alert-warn{background:var(--yellow-bg);border:1px solid rgba(251,191,36,0.2);color:var(--yellow)}.alert-ok{background:var(--green-bg);border:1px solid rgba(74,222,128,0.2);color:var(--green)}.alert-info{background:var(--blue-bg);border:1px solid rgba(96,165,250,0.2);color:var(--blue)}
  /* ── ACTION CARD SYSTEM ── */
  .ac-section{margin-bottom:22px}
  .ac-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .ac-head-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .ac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
  .ac{display:flex;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative}
  .ac:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.12)}
  .ac:active{transform:translateY(0)}
  .ac-stripe{width:4px;flex-shrink:0}
  .ac-body{padding:10px 13px;flex:1;min-width:0}
  .ac-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:5px}
  .ac-prod{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.3;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ac-days{font-size:10px;font-weight:700;font-family:var(--mono);padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
  .ac-date{font-size:11px;color:var(--text-dim);margin-bottom:7px}
  .ac-pills{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
  .ac-pill{font-size:10.5px;font-family:var(--mono);font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap}
  .ac-action{font-size:11.5px;color:var(--text-muted);line-height:1.4;border-top:1px solid rgba(0,0,0,0.05);padding-top:7px;margin-top:0}
  .ac-action strong{font-weight:600}
  /* Varianten */
  .ac-orange .ac-stripe{background:#f97316}
  .ac-orange .ac-days{background:rgba(249,115,22,0.12);color:#f97316}
  .ac-orange .ac-pill-main{background:rgba(249,115,22,0.1);color:#c2410c}
  .ac-orange .ac-pill-sec{background:rgba(0,0,0,0.05);color:var(--text-dim)}
  .ac-red .ac-stripe{background:var(--red)}
  .ac-red .ac-days{background:rgba(220,38,38,0.12);color:var(--red)}
  .ac-red .ac-pill-main{background:rgba(220,38,38,0.1);color:var(--red)}
  .ac-red .ac-pill-sec{background:rgba(0,0,0,0.05);color:var(--text-dim)}
  .ac-blue .ac-stripe{background:var(--blue)}
  .ac-blue .ac-days{background:rgba(37,99,235,0.12);color:var(--blue)}
  .ac-blue .ac-pill-main{background:rgba(37,99,235,0.1);color:var(--blue)}
  .ac-blue .ac-pill-sec{background:rgba(0,0,0,0.05);color:var(--text-dim)}
  .ac-purple .ac-stripe{background:#7c3aed}
  .ac-purple .ac-days{background:rgba(124,58,237,0.12);color:#7c3aed}
  .ac-purple .ac-pill-main{background:rgba(124,58,237,0.1);color:#7c3aed}
  .ac-purple .ac-pill-sec{background:rgba(0,0,0,0.05);color:var(--text-dim)}
  .ac-green .ac-stripe{background:var(--green)}
  .ac-green .ac-days{background:rgba(22,163,74,0.12);color:var(--green)}
  .ac-green .ac-pill-main{background:rgba(22,163,74,0.1);color:#15803d}
  .ac-green .ac-pill-sec{background:rgba(0,0,0,0.05);color:var(--text-dim)}
  .ac-empty{font-size:12px;color:var(--text-dim);font-style:italic;padding:8px 0}
  /* Legacy al-kachel (Rückwärtskompatibilität) */
  .al-section{margin-bottom:20px}.al-kachel-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:8px}.al-kachel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:12px}.al-kachel{padding:10px 14px;border-radius:8px;cursor:pointer;transition:opacity .15s;border:1px solid transparent}.al-kachel:hover{opacity:.8}.al-krit{background:var(--red-bg);border-color:rgba(248,113,113,0.25)}.al-high{background:var(--green-bg);border-color:rgba(74,222,128,0.25)}.al-vel{background:rgba(59,130,246,0.07);border-color:rgba(59,130,246,0.25)}.al-k-prod{font-size:12px;font-weight:600;color:var(--text-dim)}.al-k-date{font-size:11px;color:var(--text-dim);margin-bottom:4px}.al-k-val{font-size:18px;font-weight:700}.al-krit .al-k-val{color:var(--red)}.al-high .al-k-val{color:var(--green)}.al-vel .al-k-val{color:var(--blue)}.al-k-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
  .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:20px}
  .tbl-head{padding:12px 16px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .tbl-count{font-size:11px;color:var(--text-dim);font-family:var(--mono)}.tbl-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;padding:9px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap;user-select:none;position:sticky;top:0;background:var(--surface)}
  td{padding:8px 12px;border-bottom:1px solid rgba(216,216,226,0.6);white-space:nowrap;font-family:var(--mono);font-size:11.5px}
  td.t{font-family:var(--font);font-size:12.5px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}tr:hover td{background:rgba(139,105,20,0.04)}tr:last-child td{border-bottom:none}tr.clickable{cursor:pointer}.r{text-align:right}
  /* Sticky erste Spalte (S3) */
  .tbl-scroll th:first-child,.tbl-scroll td:first-child{position:sticky;left:0;z-index:2;background:var(--surface)}
  .tbl-scroll th:nth-child(2),.tbl-scroll td:nth-child(2){position:sticky;left:80px;z-index:2;background:var(--surface)}
  .tbl-scroll tr:hover td:first-child{background:rgba(139,105,20,0.04)}
  .tbl-scroll th:first-child::after,.tbl-scroll td:first-child::after{content:'';position:absolute;top:0;right:-6px;bottom:0;width:6px;pointer-events:none}
  .tbl-scroll.scrolled th:first-child::after,.tbl-scroll.scrolled td:first-child::after{background:linear-gradient(to right,rgba(0,0,0,0.06),transparent)}
  .bar{display:inline-flex;align-items:center;gap:6px;min-width:110px}.bar-track{flex:1;height:5px;background:var(--surface-3);border-radius:3px;overflow:hidden;min-width:50px}.bar-fill{height:100%;border-radius:3px;transition:width .3s ease}.bar-lbl{font-size:11px;font-family:var(--mono);min-width:40px;text-align:right}
  .bdg{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-weight:500}.bdg-g{background:rgba(22,163,74,0.1);color:var(--green)}.bdg-r{background:rgba(220,38,38,0.1);color:var(--red)}.bdg-y{background:rgba(180,83,9,0.1);color:var(--yellow)}.bdg-b{background:rgba(37,99,235,0.1);color:var(--blue)}.bdg-m{background:var(--surface-3);color:var(--text-dim)}
  .overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.25);backdrop-filter:blur(3px)}.overlay.open{display:flex;justify-content:flex-end}
  .slide{width:min(660px,92vw);height:100vh;background:var(--bg);border-left:1px solid var(--border);overflow-y:auto;padding:24px;animation:slideIn .2s ease}
  @keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
  .slide-close{float:right;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);font-size:16px;width:32px;height:32px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center}.slide-close:hover{color:var(--text)}
  .slide h2{font-size:20px;font-weight:600;margin-bottom:3px}.slide .meta{font-size:12px;color:var(--text-muted);font-family:var(--mono);margin-bottom:20px}
  .dg{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:18px}.dg label{font-size:10px;color:var(--text-dim);display:block;text-transform:uppercase;letter-spacing:.06em}.dg span{font-size:13px;font-family:var(--mono);font-weight:500}
  .dsec{margin-bottom:18px}.dsec h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
  .chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:20px}.chart-box h3{font-size:13px;font-weight:600;margin-bottom:14px}.chart-wrap{position:relative;height:280px}.chart-wrap canvas{width:100%!important;height:100%!important}
  .sec-h{font-size:14px;font-weight:600;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}.filters select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:7px 10px;font-size:12px;font-family:var(--font)}.filters select:focus{outline:none;border-color:var(--accent)}.filters label{font-size:11px;color:var(--text-dim)}
  .pw-ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.3);backdrop-filter:blur(6px);align-items:center;justify-content:center}.pw-ov.open{display:flex}
  .pw-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:min(360px,90vw);text-align:center}.pw-box h3{font-size:15px;margin-bottom:6px}.pw-box p{font-size:12px;color:var(--text-muted);margin-bottom:16px}
  .pw-box input{width:100%;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:var(--mono);margin-bottom:10px;text-align:center}.pw-box input:focus{outline:none;border-color:var(--accent)}
  .pw-btn{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-weight:600;font-size:13px;cursor:pointer}.pw-btn:hover{background:var(--accent-hover)}.pw-err{color:var(--red);font-size:11px;margin-top:6px;display:none}
  .l2-section{display:none}.l2-section.unlocked{display:block}
  .footer{padding:20px 28px;border-top:1px solid var(--border);text-align:center;font-size:10px;color:var(--text-dim);cursor:default;user-select:none}
  .sticky-col{position:sticky;left:0;z-index:2;background:var(--surface)}.sticky-col::after{content:'';position:absolute;top:0;bottom:0;right:-6px;width:6px;background:linear-gradient(90deg,rgba(0,0,0,0.04),transparent);pointer-events:none}
  tr:hover .sticky-col{background:rgba(139,105,20,0.04)}
  th[title]{cursor:help}
  th.sortable{cursor:pointer;position:relative;padding-right:18px;transition:color .15s}th.sortable:hover{color:var(--accent)}
  th.sortable .sort-ind{position:absolute;right:3px;top:50%;transform:translateY(-50%);font-size:9px;opacity:0.3;transition:opacity .15s;color:var(--text-dim);line-height:1}th.sortable:hover .sort-ind{opacity:0.6}th.sortable.asc .sort-ind,th.sortable.desc .sort-ind{opacity:1;color:var(--accent)}
  /* Tooltips (S3 → S11.5: JS fixed-position, kein Clipping) */
  .tip{cursor:help;border-bottom:1px dotted var(--text-dim)}
  #js-tip{position:fixed;background:var(--text);color:#fff;font-size:10px;font-weight:400;white-space:nowrap;padding:4px 8px;border-radius:4px;z-index:9999;pointer-events:none;opacity:0;transition:opacity .1s}
  /* Ampel-Kacheln (S11.5) */
  .prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
  .prod-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;overflow:hidden}
  .prod-card:hover{border-color:var(--border-light);box-shadow:0 2px 8px rgba(0,0,0,0.06)}
  .prod-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
  .prod-card.pc-green::before{background:var(--green)}.prod-card.pc-blue::before{background:var(--blue)}.prod-card.pc-yellow::before{background:var(--yellow)}.prod-card.pc-red::before{background:var(--red)}
  .prod-card-name{font-size:12.5px;font-weight:600;margin-bottom:8px;padding-left:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prod-card-ausl{font-size:26px;font-weight:700;font-family:var(--mono);letter-spacing:-0.04em;padding-left:8px;line-height:1}
  .prod-card-meta{display:flex;gap:12px;margin-top:6px;padding-left:8px;flex-wrap:wrap}
  .prod-card-meta span{font-size:10.5px;font-family:var(--mono);color:var(--text-muted)}
  .prod-card-meta .pc-trend-up{color:var(--green)}.prod-card-meta .pc-trend-down{color:var(--red)}.prod-card-meta .pc-trend-flat{color:var(--text-dim)}
  /* Swipe-Drawer (S11.5) */
  .swipe-overlay{display:none;position:fixed;inset:0;z-index:150;background:rgba(0,0,0,0.2);backdrop-filter:blur(2px)}.swipe-overlay.open{display:flex;align-items:flex-end}
  .swipe-drawer{width:100%;max-height:82vh;background:var(--surface);border-radius:16px 16px 0 0;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;animation:drawerUp .22s ease}
  @keyframes drawerUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}

  .swipe-drawer-header select{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:13px;font-family:var(--font);flex:1;max-width:320px}
  .swipe-drawer-header select:focus{outline:none;border-color:var(--accent)}
  .swipe-drawer-close{background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);font-size:16px;width:32px;height:32px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .swipe-drawer-close:hover{color:var(--text)}
  .swipe-drawer-title{font-size:13px;font-weight:600;flex:1}
  .swipe-cards-wrap{overflow-x:auto;overflow-y:hidden;padding:16px 20px;display:flex;gap:12px;flex-shrink:0;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .swipe-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;min-width:220px;max-width:220px;flex-shrink:0;scroll-snap-align:start;cursor:pointer;transition:border-color .15s}
  .swipe-card:hover{border-color:var(--accent)}
  .swipe-card-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .swipe-card-date{font-size:12px;color:var(--text-dim);font-family:var(--mono);margin-bottom:10px}
  .swipe-card-ausl{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:-0.04em;line-height:1;margin-bottom:6px}
  .swipe-card-row{display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);color:var(--text-muted);margin-top:3px}
  .swipe-card-row strong{color:var(--text);font-weight:500}
  .swipe-empty{padding:24px 20px;color:var(--text-dim);font-size:13px;text-align:center}

  /* Empfehlungs-Boxen (S5) */
  .pg-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;margin-left:4px;vertical-align:middle}
  .pg-badge-orange{background:rgba(180,83,9,0.12);color:var(--yellow)}
  .pg-badge-blue{background:rgba(37,99,235,0.12);color:var(--blue)}
  .pg-badge-purple{background:rgba(124,58,237,0.12);color:#7c3aed}
  .panel-rec-summary{font-size:11.5px;padding:5px 10px;border-radius:var(--radius);margin-bottom:8px;font-weight:500}
  .panel-rec-summary-orange{background:rgba(180,83,9,0.07);color:var(--yellow);border:1px solid rgba(180,83,9,0.18)}
  .panel-rec-summary-blue{background:rgba(37,99,235,0.07);color:var(--blue);border:1px solid rgba(37,99,235,0.18)}
  .rec-prio{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:5px;font-family:var(--mono)}
  .prio-h{background:rgba(220,38,38,0.12);color:var(--red)}.prio-m{background:rgba(180,83,9,0.12);color:var(--yellow)}

  .l2-rec-section{display:none}.l2-rec-section.unlocked{display:block}
  /* Suchfeld (S7) */
  .search-wrap{position:relative;flex:1;min-width:180px;max-width:320px}
  .search-wrap input{width:100%;padding:7px 10px 7px 30px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;font-family:var(--font);transition:border-color .15s}
  .search-wrap input:focus{outline:none;border-color:var(--accent)}
  .search-wrap input::placeholder{color:var(--text-dim)}
  .search-wrap .search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-dim);pointer-events:none}

  .panel-nav{display:flex;align-items:center;gap:6px;margin-bottom:4px}

const F=(v,d=0)=>v==null||isNaN(v)?'–':Number(v).toLocaleString('de-DE',{minimumFractionDigits:d,maximumFractionDigits:d});
const eur=v=>v==null||isNaN(v)?'–':Number(v).toLocaleString('de-DE',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0});
const eurP=v=>v==null||isNaN(v)?'–':Number(v).toLocaleString('de-DE',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2});
const P=v=>v==null||isNaN(v)?'–':F(v,1)+'%';
const D=d=>{if(!d||d==='None')return'–';const p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0]};
const dT=d=>{const n=new Date();n.setHours(0,0,0,0);return Math.ceil((new Date(d)-n)/864e5)};
const pC=(v,w)=>{if(w===true)return'var(--danger, #dc2626)';return v>=90?'var(--green)':v>=70?'var(--blue)':v>=50?'var(--yellow)':'var(--red)'};
const vL=p=>({foerderer:'Förderer',freundeskreis:'Freundeskreis',offiziell:'Offiziell'}[p]||p||'–');

const dC=v=>(v||0)>0?'var(--green)':(v||0)<0?'var(--red)':'var(--text-dim)';
const dF=v=>v>0?'+'+F(v):F(v);
function bar(val,lbl){const c=Math.min(Math.max(val||0,0),100),clr=pC(val||0);return`<div class="bar"><div class="bar-track"><div class="bar-fill" style="width:${c}%;background:${clr}"></div></div><div class="bar-lbl" style="color:${clr}">${lbl||P(val)}</div></div>`}

// Gibt {cls,sym,title} zurück. sym: ● für Ampel, ★ für Stern (L2)
function ampelData(v,starred){
  const ausl=v.auslastung_verkauf_pct??v.auslastung_gesamt_pct??0;
  const d=dT(v.datum);
  if(starred){return{cls:'amp-star',sym:'★',title:'Potenzial: hohe Nachfrage'};}
  if((ausl<50&&d<=14)||(ausl<30&&d<=30)){return{cls:'amp-r',sym:'●',title:`Kritisch: ${P(ausl)} Auslastung, ${d}d`};}
  if(ausl<70&&d<=30){return{cls:'amp-y',sym:'●',title:`Aufmerksamkeit: ${P(ausl)} Auslastung, ${d}d`};}
  return{cls:'amp-g',sym:'●',title:`Auf Kurs: ${P(ausl)} Auslastung`};
}
function ampelHTML(v,starred){const a=ampelData(v,starred);return`<span class="ampel ${a.cls}" title="${a.title}">${a.sym}</span>`;}

// ── EMPFEHLUNGEN BERECHNEN (S5) ──
// va: gefiltertes Array der sichtbaren VAs
function calcRecs(va){
  // L1: Kontingent-Freigabe (orange)
  const freigabe=[];
  va.forEach(v=>{
    const auslVK=v.auslastung_verkauf_pct??v.auslastung_gesamt_pct??0;
    const d=dT(v.datum);
    if((v.freie_plaetze||0)<20&&(v.kontingente||0)>12&&d<=30){
      const prio=d<=14?'HOCH':'MITTEL';
      freigabe.push({v,auslVK,d,prio});
    }
  });
  freigabe.sort((a,b)=>a.d-b.d);

  // L1: Kritische VA (rot) – für KPI-Kontext
  let kritisch=0,aufKurs=0;
  va.forEach(v=>{
    const ausl=v.auslastung_verkauf_pct??v.auslastung_gesamt_pct??0;
    const d=dT(v.datum);
    if((ausl<50&&d<=14)||(ausl<30&&d<=30))kritisch++;
    else aufKurs++;
  });

  // L2: Preis-Empfehlungen — basierend auf Normalpreis-Abweichung (06.03.2026)
  const preis=[];
  va.forEach(v=>{
    const auslVK=v.auslastung_verkauf_pct??v.auslastung_gesamt_pct??0;
    const d=dT(v.datum);
    const t7=v.tickets_7d||0;
    const prodVAs=aVA.filter(x=>x.produktion===v.produktion);
    const avg7=prodVAs.length>0?prodVAs.reduce((s,x)=>s+(x.tickets_7d||0),0)/prodVAs.length:0;
    const abw=v.preis_abweichung_pct;
    const katMed=v.katalog_median;
    if(abw!==null&&abw!==undefined){
      if(auslVK>=65&&abw<-15){
        preis.push({v,auslVK,t7,avg7:Math.round(avg7),d,
          typ:'rabatt_risiko',
          text:`Ø ${eur(v.avg_preis)} liegt ${Math.abs(abw).toFixed(1)}% unter Normalpreis (${eur(katMed)}) — Rush-Sale-Abhängigkeit, Preiserhöhung würde Velocity gefährden`});
      } else if(auslVK>=65&&abw<-5){
        preis.push({v,auslVK,t7,avg7:Math.round(avg7),d,
          typ:'preis_erhoehung',
          text:`Ø ${eur(v.avg_preis)} liegt ${Math.abs(abw).toFixed(1)}% unter Normalpreis (${eur(katMed)}) — Preispuffer vorhanden`});
      } else if(auslVK>=65&&abw>=-2){
        preis.push({v,auslVK,t7,avg7:Math.round(avg7),d,
          typ:'kontingent_check',
          text:`Ø ${eur(v.avg_preis)} entspricht Normalpreis (${eur(katMed)}) — kein Preispuffer, Kontingente prüfen`});
      }
    } else {
      if(auslVK>=70&&t7>avg7*2&&d>14){
        preis.push({v,auslVK,t7,avg7:Math.round(avg7),d,
          typ:'preis_erhoehung',
          text:`Hohe Nachfrage (${P(auslVK)} Ausl., ${F(t7)} Tickets/7d) — Preisanpassung prüfen (keine Katalogdaten)`});
      }
    }
  });
  preis.sort((a,b)=>b.t7-a.t7);

  // L2: Preisdifferenzierung — benötigt PG-Daten (nicht immer vorhanden)
  // Wird aus platzgruppen-Array berechnet falls vorhanden
  const diff=[];
  va.forEach(v=>{
    if(!v.platzgruppen||!Array.isArray(v.platzgruppen))return;
    const pgs=v.platzgruppen.filter(p=>p.kapazitaet_vk>0);
    const high=pgs.filter(p=>p.auslastung_vk_pct>=80);
    const low=pgs.filter(p=>p.auslastung_vk_pct<60);
    if(high.length>0&&low.length>0){
      diff.push({v,high,low});
    }
  });

  // L2: Rush-Sale (rot) – niedrige Auslastung + bald
  const rush=[];
  va.forEach(v=>{
    const auslVK=v.auslastung_verkauf_pct??v.auslastung_gesamt_pct??0;
    const d=dT(v.datum);
    if(auslVK<50&&d<=14&&d>0){rush.push({v,auslVK,d});}
  });
  rush.sort((a,b)=>a.d-b.d);

  const velocity_high=va.filter(v=>v.velocity_zscore!=null&&v.velocity_zscore>1.5&&dT(v.datum)>0);

  return{freigabe,kritisch,aufKurs,preis,diff,rush,velocity_high};
}

const _sortState={};
function parseNum(txt){
  if(!txt||txt==='–'||txt==='-')return-Infinity;
  const clean=txt.replace(/<[^>]*>/g,'').trim().replace(/[↑↓→]/g,'').replace(/\/d\b/g,'');
  const bd=clean.match(/^(-?\d+)d$/);if(bd)return+bd[1];
  const dm=clean.match(/^(\d{2})\.(\d{2})\.(\d{4})/);if(dm)return+(dm[3]+dm[2]+dm[1]);
  const slash=clean.match(/^([\d.,]+)\s*\/\s*([\d.,]+)$/);if(slash)return+slash[1].replace('.','').replace(',','.');
  const pct=clean.match(/(-?[\d.,]+)\s*%/);if(pct)return+pct[1].replace('.','').replace(',','.');
  const cur=clean.replace(/[€\s]/g,'');
  const num=cur.replace(/\./g,'').replace(',','.');
  const v=parseFloat(num);
  return isNaN(v)?clean.toLowerCase():v;
}
function sortTable(tblEl,colIdx,thEl){
  const key=tblEl.id||tblEl.closest('.tbl-wrap')?.querySelector('.tbl-head')?.textContent||'t';
  const stateKey=key+'_'+colIdx;
  const prev=_sortState[stateKey];
  const dir=prev==='asc'?'desc':'asc';
  tblEl.querySelectorAll('th.sortable').forEach(h=>{h.classList.remove('asc','desc');const ind=h.querySelector('.sort-ind');if(ind)ind.textContent='↕'});
  Object.keys(_sortState).forEach(k=>{if(k.startsWith(key+'_'))delete _sortState[k]});
  _sortState[stateKey]=dir;
  thEl.classList.add(dir);
  const ind=thEl.querySelector('.sort-ind');if(ind)ind.textContent=dir==='asc'?'▲':'▼';
  const tbody=tblEl.querySelector('tbody');if(!tbody)return;
  const rows=Array.from(tbody.querySelectorAll('tr'));
  rows.sort((a,b)=>{
    // Ampel-Spalte: data-amp Attribut des tr nutzen (0=rot,1=gelb,2=stern,3=grün)
    if(colIdx===14){
      const av=+(a.dataset.amp??9),bv=+(b.dataset.amp??9);
      return dir==='asc'?av-bv:bv-av;
    }
    const ac=a.children[colIdx],bc=b.children[colIdx];
    if(!ac||!bc)return 0;
    let av=parseNum(ac.innerHTML),bv=parseNum(bc.innerHTML);
    if(typeof av==='string'&&typeof bv==='string')return dir==='asc'?av.localeCompare(bv,'de'):bv.localeCompare(av,'de');
    if(typeof av==='string')av=-Infinity;if(typeof bv==='string')bv=-Infinity;
    return dir==='asc'?av-bv:bv-av;
  });
  rows.forEach(r=>tbody.appendChild(r));
}
function initSort(){
  document.querySelectorAll('table').forEach(tbl=>{
    tbl.querySelectorAll('th').forEach((th,i)=>{
      const txt=th.textContent.trim();
      const skip=['Anteil','PG'];
      if(skip.includes(txt))return;
      if(th.classList.contains('sortable'))return;
      th.classList.add('sortable');
      th.innerHTML=th.innerHTML+'<span class="sort-ind">↕</span>';
      th.addEventListener('click',()=>sortTable(tbl,i,th));
    });
  });
}

function _trapFocus(e){
  if(e.key!=='Tab')return;
  const panel=$('#slide');if(!panel)return;
  const focusable=Array.from(panel.querySelectorAll('button,input,select,textarea,[tabindex]:not([tabindex="-1"]),[href]')).filter(el=>!el.disabled&&el.offsetParent!==null);
  if(!focusable.length){e.preventDefault();return;}
  const first=focusable[0],last=focusable[focusable.length-1];
  if(e.shiftKey){if(document.activeElement===first){e.preventDefault();last.focus();}}
  else{if(document.activeElement===last){e.preventDefault();first.focus();}}
}

function buildSparkline(){

  const last7=zr.slice(-7);
  if(last7.length===0)return'';
  const vals=last7.map(d=>d.tagesverkauf||0);

    const h=Math.max(2,Math.round((v/mx)*28));

    return`<div class="${cls}" style="height:${h}px" title="${last7[i].datum}: ${v} Tickets"></div>`;
  }).join('');

}

// ── PG-EMPFEHLUNGEN IM PANEL ──
function pgPanelRecs(v){
  const pgs=v.platzgruppen||[];
  if(!pgs.length)return{summaryHTML:'',badgeMap:{}};
  // Feldnamen: platzgruppe (Tabelle) = pg (calcRecs) -- beide moeglich
  const pgId=pg=>pg.pg||pg.platzgruppe||'?';
  const vkAusl=pg=>pg.auslastung_vk_pct!=null?pg.auslastung_vk_pct:pg.auslastung_gesamt_pct;
  // L1: Kontingent-Freigabe je PG
  const freigabePGs=pgs.filter(pg=>(pg.frei_verkaufbar||0)<20&&(pg.kontingente||0)>12);
  // L2: Preis-Badge je PG (ueberdurchschnittliche VK-Auslastung > 80%, mind. 2 PGs vorhanden)
  const aktivePGs=pgs.filter(pg=>(pg.kapazitaet_vk||pg.kapazitaet||0)>0);
  const avgVkAusl=aktivePGs.length?aktivePGs.reduce((s,pg)=>s+vkAusl(pg),0)/aktivePGs.length:0;
  const preisPGs=l2?pgs.filter(pg=>vkAusl(pg)>=80&&vkAusl(pg)>avgVkAusl+5):[];
  // L2: Differenzierungs-Badge (mind. eine PG >=80%, mind. eine <60%)
  const highPGs=l2?pgs.filter(pg=>vkAusl(pg)>=80):[];
  const lowPGs=l2?pgs.filter(pg=>vkAusl(pg)<60&&(pg.kapazitaet_vk||pg.kapazitaet||0)>0):[];
  const hasDiff=l2&&highPGs.length>0&&lowPGs.length>0;
  // Badge-Map: pgId -> HTML-Badges
  const badgeMap={};
  freigabePGs.forEach(pg=>{
    const id=pgId(pg);
    badgeMap[id]=(badgeMap[id]||'')+`<span class="pg-badge pg-badge-orange" title="${F(pg.frei_verkaufbar)} frei · ${F(pg.kontingente)} Kont. → Freigabe prüfen">Freigabe</span>`;
  });
  if(hasDiff){
    highPGs.forEach(pg=>{const id=pgId(pg);badgeMap[id]=(badgeMap[id]||'')+`<span class="pg-badge pg-badge-purple" title="Hoch vs. andere PGs → Differenzierung prüfen">Diff.</span>`;});
    lowPGs.forEach(pg=>{const id=pgId(pg);badgeMap[id]=(badgeMap[id]||'')+`<span class="pg-badge pg-badge-purple" title="Niedrig vs. andere PGs → Differenzierung prüfen">Diff.</span>`;});
  }
  preisPGs.filter(pg=>!hasDiff||(vkAusl(pg)>avgVkAusl+5)).forEach(pg=>{
    const id=pgId(pg);
    if(!hasDiff){const abwTip=v.preis_abweichung_pct!=null?`${Math.abs(v.preis_abweichung_pct).toFixed(0)}% unter Normalpreis — `:'';badgeMap[id]=(badgeMap[id]||'')+`<span class="pg-badge pg-badge-blue" title="${abwTip}Preiserhöhung prüfen">Preis↑</span>`;}
  });
  // Zusammenfassung oben
  const totalHandlungL1=freigabePGs.length;
  const totalHandlungL2=l2?(new Set([...preisPGs.map(pgId),...(hasDiff?[...highPGs,...lowPGs].map(pgId):[])]).size):0;
  const total=totalHandlungL1+(totalHandlungL2>0?totalHandlungL2:0);
  let summaryHTML='';
  if(total>0){
    const parts=[];
    if(totalHandlungL1>0)parts.push(`<span class="pg-badge pg-badge-orange">${totalHandlungL1} Freigabe</span>`);
    if(l2&&hasDiff)parts.push(`<span class="pg-badge pg-badge-purple">Differenzierung</span>`);
    if(l2&&preisPGs.length>0&&!hasDiff)parts.push(`<span class="pg-badge pg-badge-blue">${preisPGs.length} Preis↑</span>`);
    summaryHTML=`<div class="panel-rec-summary panel-rec-summary-orange">${total} PG${total!==1?'s':''} mit Handlungsbedarf: ${parts.join(' ')}</div>`;
  }
  return{summaryHTML,badgeMap};
}

>Start</label><span>${D(v.vvk_start)}</span></div><div><label>Phase</label><span>${vL(v.vvk_phase)}</span></div><div><label>Offiziell</label><span>${D(v.vvk_offiziell)}</span></div>${v.katalog_median!=null?`<div><label>Normalpreis-Ref.</label><span>${eur(v.katalog_median)}</span></div>`:''} ${v.preis_abweichung_pct!=null?`<div><label>Preisabweichung</label><span style="color:${v.preis_abweichung_pct<-15?'var(--orange,#f97316)':v.preis_abweichung_pct<-5?'var(--yellow)':'var(--green)'}">${v.preis_abweichung_pct>0?'+':''}${v.preis_abweichung_pct.toFixed(1)}%</span></div>`:''}</div></div><div class="dsec"><h3>Platzgruppen</h3>${prRec.summaryHTML}<div class="tbl-scroll"><table><thead><tr><th>PG</th><th class="r">Verk.</th><th class="r">Kap.</th><th>Auslastung</th><th class="r">Kont.</th><th class="r">Res.</th><th class="r">Frei VK</th></tr></thead><tbody>${pgR}</tbody></table></div></div>`;

function _pcClass(pct){
  if(pct==null)return'pc-blue';
  if(pct>=85)return'pc-green';
  if(pct>=70)return'pc-blue';
  if(pct>=50)return'pc-yellow';
  return'pc-red';
}

function _buildProdCards(prods){
  return prods.map(x=>{
    const pct=x.auslastung_pct;
    const cls=_pcClass(pct);
    const col=pct==null?'var(--text-dim)':pct>=85?'var(--green)':pct>=70?'var(--blue)':pct>=50?'var(--yellow)':'var(--red)';
    const t1=x.tickets_1d;const t7=x.tickets_7d;
    const trendCls=t1>0?'pc-trend-up':t1<0?'pc-trend-down':'pc-trend-flat';
    const trendStr=t1!=null?(t1>0?'+':'')+t1+'h':'–';
    return`<div class="prod-card ${cls}" onclick="filterProdFromCard('${x.name.replace(/'/g,"\'")}')">
      <div class="prod-card-name">${x.name}</div>
      <div class="prod-card-ausl" style="color:${col}">${pct!=null?P(pct):'–'}</div>
      <div class="prod-card-meta">
        <span>${x.anzahl_veranstaltungen} VA</span>
        <span>${eur(x.umsatz_gesamt||0)}</span>
        <span class="${trendCls}">${trendStr} heute</span>
        <span style="color:var(--text-dim)">${t7!=null?F(t7)+'/7d':'–'}</span>
      </div>
    </div>`;
  }).join('');
}

function _buildProdRows(prods){
  return prods.map(x=>{
    const tk=x.tickets_kartenverkauf!=null?x.tickets_kartenverkauf:x.tickets_gesamt;
    return`<tr><td class="t">${x.name}</td><td class="r">${x.avg_preis!=null?eurP(x.avg_preis):'–'}</td><td class="r">${x.anzahl_veranstaltungen}</td><td class="r">${F(tk)}</td><td class="r">${F(x.kontingente||0)}</td><td class="r">${F(x.kapazitaet_gesamt)}</td><td>${bar(x.auslastung_pct)}</td><td class="r">${eur(x.umsatz_gesamt||0)}</td><td class="r" style="color:${dC(x.tickets_1d)}">${dF(x.tickets_1d||0)}</td><td class="r">${F(x.tickets_7d||0)}</td></tr>`;
  }).join('');
}

// Aggregiert VA-Daten zu Produktions-Kennzahlen für einen gefilterten VA-Subset
function _aggregateProds(filteredVA){
  const byProd={};
  filteredVA.forEach(v=>{
    const k=v.produktion;
    if(!byProd[k])byProd[k]={name:k,vaSet:new Set(),kv:0,kont:0,kap:0,umsatz:0,t1:0,t7_sum:0,t7_cnt:0};
    const p=byProd[k];
    p.vaSet.add(v.va_nr);
    p.kv+=KV(v);
    p.kont+=(v.kontingente||0);
    p.kap+=(v.kapazitaet||0);
    p.umsatz+=(v.umsatz_gesamt||0);
    p.t1+=(v.tickets_1d||0);
    if(v.tickets_7d!=null){p.t7_sum+=v.tickets_7d;p.t7_cnt++;}
  });
  return Object.values(byProd).map(p=>({
    name:p.name,
    anzahl_veranstaltungen:p.vaSet.size,
    tickets_kartenverkauf:p.kv,
    kontingente:p.kont,
    kapazitaet_gesamt:p.kap,
    auslastung_pct:p.kap>0?(p.kv/p.kap*100):0,
    umsatz_gesamt:p.umsatz,
    avg_preis:p.kv>0?p.umsatz/p.kv:null,
    tickets_1d:p.t1,
    tickets_7d:p.t7_cnt>0?p.t7_sum:null
  })).sort((a,b)=>(b.auslastung_pct||0)-(a.auslastung_pct||0));
}

function filterProds(){
  const days=$('#fTimeProd')?$('#fTimeProd').value:'';
  // Kacheln: nach Zeitraum gefiltert
  let filteredVA;
  if(!days){
    filteredVA=aVA;
  } else if(days.startsWith('month:')){
    const m=days.slice(6);
    filteredVA=aVA.filter(v=>v.datum.startsWith(m));
  } else {
    filteredVA=aVA.filter(v=>dT(v.datum)<=+days);
  }
  const prodsFiltered=_aggregateProds(filteredVA);
  const cardsWrap=$('#prodCardsWrap');
  if(cardsWrap)cardsWrap.innerHTML=_buildProdCards(prodsFiltered);
  const cnt=$('#prodCount');if(cnt)cnt.textContent=prodsFiltered.length;
  // Tabelle: immer alle Produktionen
  const prodsAll=_aggregateProds(aVA);
  const tbody=$('#prodTbody');
  if(tbody)tbody.innerHTML=_buildProdRows(prodsAll);
  const tbl=$('#tblProds');
  if(tbl){tbl.querySelectorAll('th').forEach((th,i)=>{if(!th.classList.contains('sortable')){th.classList.add('sortable');th.innerHTML=th.innerHTML+'<span class="sort-ind">↕</span>';th.addEventListener('click',()=>sortTable(tbl,i,th));}});}
}

const ZR_COLORS=['#8b6914','#2563eb','#16a34a','#dc2626','#7c3aed','#0891b2','#d97706','#9333ea','#059669','#e11d48','#0284c7','#65a30d'];
let _zrMode='gesamt';
let _zrProds=[]; // [{nr, name, color}]

function zrSetMode(mode){
  _zrMode=mode;
  const btnG=$('#zrBtnGesamt');const btnP=$('#zrBtnProd');
  const pSel=$('#zrProdSel');const chips=$('#zrProdChips');
  if(mode==='gesamt'){
    if(btnG)btnG.classList.add('active');if(btnP)btnP.classList.remove('active');
    if(btnG)btnG.setAttribute('aria-pressed','true');if(btnP)btnP.setAttribute('aria-pressed','false');
    $('#zrGesamt').style.display='';$('#zrProdView').style.display='none';
    if(pSel)pSel.style.display='none';if(chips)chips.style.display='none';
  } else {
    if(btnP)btnP.classList.add('active');if(btnG)btnG.classList.remove('active');
    if(btnP)btnP.setAttribute('aria-pressed','true');if(btnG)btnG.setAttribute('aria-pressed','false');
    $('#zrGesamt').style.display='none';$('#zrProdView').style.display='';
    if(pSel)pSel.style.display='flex';if(chips)chips.style.display='flex';
    zrRenderCharts();
  }
}

function zrAddProd(){
  const sel=$('#zrProdAdd');if(!sel||!sel.value)return;
  const nr=parseInt(sel.value);
  if(_zrProds.find(p=>p.nr===nr))return; // bereits drin
  const zrp=DATA.zeitreihe_produktionen||[];
  const pd=zrp.find(p=>p.produktionsnummer===nr);
  if(!pd)return;
  const color=ZR_COLORS[_zrProds.length%ZR_COLORS.length];
  _zrProds.push({nr,name:pd.name,color});
  sel.value='';
  zrRenderChips();zrRenderCharts();
}

function zrRemoveProd(nr){
  _zrProds=_zrProds.filter(p=>p.nr!==nr);
  zrRenderChips();zrRenderCharts();
}

function zrClearProds(){_zrProds=[];zrRenderChips();zrRenderCharts();}

function zrRenderChips(){
  const wrap=$('#zrProdChips');if(!wrap)return;
  wrap.innerHTML=_zrProds.map(p=>`<span class="zr-chip" style="border-color:${p.color};color:${p.color}">${p.name}<button onclick="zrRemoveProd(${p.nr})" aria-label="${p.name} entfernen" title="Entfernen">✕</button></span>`).join('');
}

function zrRenderCharts(){
  const zrp=DATA.zeitreihe_produktionen||[];
  const title=$('#zrMultiTitle');

  if(!_zrProds.length){
    // Leerzustand
    _mkChart('cProdDaily',{type:'bar',data:{labels:[],datasets:[]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
    _mkChart('cProdCum',{type:'line',data:{labels:[],datasets:[]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
    const tbl=$('#zrProdTbl');if(tbl)tbl.innerHTML=`<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:13px">Füge Produktionen über das Dropdown hinzu, um sie zu vergleichen.</div>`;
    if(title)title.textContent='Tägliche Verkäufe — Produktionsvergleich';
    return;
  }
  if(title)title.textContent='Tägliche Verkäufe — '+_zrProds.map(p=>p.name).join(' vs. ');

  // Alle Datumsangaben über alle gewählten Produktionen vereinigen
  const allDates=new Set();
  _zrProds.forEach(p=>{const pd=zrp.find(x=>x.produktionsnummer===p.nr);if(pd)pd.daten.forEach(d=>allDates.add(d.datum));});
  const sortedDates=[...allDates].sort();
  const labels=sortedDates.map(d=>D(d));

  // Datasets: pro Produktion eine Linie
  const dsDaily=_zrProds.map(p=>{
    const pd=zrp.find(x=>x.produktionsnummer===p.nr);
    const byDate=pd?Object.fromEntries(pd.daten.map(d=>[d.datum,d.tagesverkauf])):{};
    return{label:p.name,data:sortedDates.map(d=>byDate[d]??null),backgroundColor:p.color+'55',borderColor:p.color,borderWidth:2,borderRadius:2,spanGaps:false};
  });
  const dsCum=_zrProds.map(p=>{
    const pd=zrp.find(x=>x.produktionsnummer===p.nr);
    const byDate=pd?Object.fromEntries(pd.daten.map(d=>[d.datum,d.kumuliert])):{};
    return{label:p.name,data:sortedDates.map(d=>byDate[d]??null),borderColor:p.color,backgroundColor:p.color+'18',fill:false,tension:0.3,pointRadius:2,pointHoverRadius:5,borderWidth:2.5,spanGaps:false};
  });

  // Durchschnittslinie über alle gewählten Produktionen (kumuliert)
  if(_zrProds.length>=2){
    const avgData=sortedDates.map(d=>{
      const vals=_zrProds.map(p=>{const pd=zrp.find(x=>x.produktionsnummer===p.nr);return pd?pd.daten.find(x=>x.datum===d)?.kumuliert??null:null;}).filter(v=>v!==null);
      return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
    });
    dsCum.push({label:'Ø Durchschnitt',data:avgData,borderColor:'#94a3b8',backgroundColor:'transparent',borderDash:[5,4],borderWidth:1.5,fill:false,tension:0.3,pointRadius:0,spanGaps:true});
  }

  const chartOpts=(type)=>({responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,position:'top',labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y!=null?F(ctx.parsed.y):'–'}`}}},scales:{x:{grid:{display:false},ticks:{maxRotation:45,maxTicksLimit:20}},y:{grid:{color:'#e6e6ee'},ticks:{callback:v=>F(v)}}}});
  _mkChart('cProdDaily',{type:'bar',data:{labels,datasets:dsDaily},options:chartOpts('bar')});
  _mkChart('cProdCum',{type:'line',data:{labels,datasets:dsCum},options:chartOpts('line')});

  // Vergleichs-Tabelle
  const tbl=$('#zrProdTbl');if(!tbl)return;
  const lastDate=sortedDates[sortedDates.length-1];
  const rowsHtml=_zrProds.map(p=>{
    const pd=zrp.find(x=>x.produktionsnummer===p.nr);
    if(!pd)return'';
    const last=pd.daten[pd.daten.length-1];
    const first=pd.daten[0];
    const peak=pd.daten.reduce((a,b)=>b.tagesverkauf>a.tagesverkauf?b:a,pd.daten[0]||{tagesverkauf:0,datum:''});
    const avg=pd.daten.length?Math.round(pd.daten.reduce((s,d)=>s+d.tagesverkauf,0)/pd.daten.length):0;
    return`<tr><td><span class="zr-chip-dot" style="background:${p.color}"></span>${p.name}</td><td class="r">${last?F(last.kumuliert):'–'}</td><td class="r">${pd.daten.length?F(pd.daten.length):0} Tage</td><td class="r">${F(avg)}/d</td><td class="r">${peak.tagesverkauf?F(peak.tagesverkauf)+' ('+D(peak.datum)+')':'–'}</td></tr>`;
  }).join('');
  tbl.innerHTML=`<div class="tbl-wrap"><div class="tbl-head">Produktionsvergleich</div><div class="tbl-scroll"><table><thead><tr><th>Produktion</th><th class="r">Kumuliert</th><th class="r">Zeitraum</th><th class="r">Ø/Tag</th><th class="r">Spitzentag</th></tr></thead><tbody>${rowsHtml}</tbody></table></div></div>`;
}

// Produktions-Dropdown geändert → VA-Dropdown befüllen + Tabelle rendern
function _mixProdChange(){
  const mix=DATA.verkaufsmix||[];
  const prod=$('#fMixProd')?$('#fMixProd').value:'';
  const vaWrap=$('#mixVaWrap');
  const fVa=$('#fMixVa');
  if(prod&&vaWrap&&fVa){
    // VA-Einträge dieser Produktion sammeln
    const vas=[...new Map(
      mix.filter(m=>(m.ebene==='va')&&m.produktion===prod&&m.va_nr!=null)
         .map(m=>[m.va_nr,{nr:m.va_nr,name:m.va_name||String(m.va_nr)}])
    ).values()].sort((a,b)=>a.nr-b.nr);
    if(vas.length>0){
      fVa.innerHTML=`<option value="">Alle Veranstaltungen</option>`+
        vas.map(v=>`<option value="${v.nr}">${v.name||v.nr}</option>`).join('');
      vaWrap.style.display='flex';
    } else {
      vaWrap.style.display='none';
      fVa.innerHTML='<option value="">Alle Veranstaltungen</option>';
    }
  } else if(vaWrap&&fVa){
    vaWrap.style.display='none';
    fVa.innerHTML='<option value="">Alle Veranstaltungen</option>';
  }
  renderMixTable();
}

// ── VERKAUFSMIX-TABELLE RENDERN ──
function renderMixTable(){
  const mix=DATA.verkaufsmix||[];
  const prod=$('#fMixProd')?$('#fMixProd').value:'';
  const vaNr=$('#fMixVa')?parseInt($('#fMixVa').value)||null:null;

  let items,title,subtitle='';

  if(!prod){
    // Ebene: Alle Produktionen — summiere Produktions-Ebene
    const src=mix.filter(m=>m.ebene==='produktion'||!m.ebene);
    const agg={};
    src.forEach(m=>{agg[m.verkaufsart]=(agg[m.verkaufsart]||0)+m.anzahl});
    items=Object.entries(agg).map(([v,n])=>({verkaufsart:v,anzahl:n})).sort((a,b)=>b.anzahl-a.anzahl);
    title='Alle Produktionen';
    _updateMixChart(items,'Top 12 Verkaufsarten (gesamt)');
  } else if(prod&&!vaNr){
    // Ebene: Produktion (alle VAs aggregiert) — nutze Produktions-Ebene
    const src=mix.filter(m=>(m.ebene==='produktion'||!m.ebene)&&m.produktion===prod);
    items=src.slice().sort((a,b)=>b.anzahl-a.anzahl);
    title=prod;
    const shortP=prod.length>35?prod.slice(0,33)+'…':prod;
    _updateMixChart(items,`Top 12 — ${shortP}`);
  } else {
    // Ebene: Einzelne VA
    const src=mix.filter(m=>m.ebene==='va'&&m.va_nr===vaNr);
    items=src.slice().sort((a,b)=>b.anzahl-a.anzahl);
    const vaName=src[0]?src[0].va_name||String(vaNr):String(vaNr);
    title=prod;
    subtitle=vaName;
    const shortN=vaName.length>35?vaName.slice(0,33)+'…':vaName;
    _updateMixChart(items,`Top 12 — ${shortN}`);
  }

  const total=items.reduce((s,i)=>s+i.anzahl,0);
  const rows=items.map(i=>{
    const p=total>0?(i.anzahl/total*100):0;
    return`<tr>`+
      `<td class="t">${i.verkaufsart}</td>`+
      `<td class="r">${F(i.anzahl)}</td>`+
      `<td class="r" style="color:var(--text-dim);font-size:11px;font-family:var(--mono)">${P(p)}</td>`+
      `<td>${bar(p)}</td>`+
    `</tr>`;
  }).join('');

  const headLine=subtitle
    ?`${title} <span style="font-weight:400;color:var(--text-dim);font-size:12px">· ${subtitle}</span>`
    :title;

  const wrap=$('#mixTblWrap');
  if(wrap){
    wrap.innerHTML=`<div class="tbl-wrap">`+
      `<div class="tbl-head">${headLine} <span class="tbl-count">${F(total)} Tickets · ${items.length} Verkaufsarten</span></div>`+
      `<div class="tbl-scroll"><table id="tblMix">`+
        `<thead><tr><th>Verkaufsart</th><th class="r">Anzahl</th><th class="r">Anteil&nbsp;%</th><th>Anteil</th></tr></thead>`+
        `<tbody>${rows}</tbody>`+
      `</table></div></div>`;
    // Sortierung
    const tbl=$('#tblMix');
    if(tbl){
      tbl.querySelectorAll('th').forEach((th,i)=>{
        if(th.textContent.trim()==='Anteil')return;
        if(th.classList.contains('sortable'))return;
        th.classList.add('sortable');
        th.innerHTML=th.innerHTML+'<span class="sort-ind">↕</span>';
        th.addEventListener('click',()=>sortTable(tbl,i,th));
      });
    }
  }
}

// Chart-Update (intern)
function _updateMixChart(items,chartTitle){
  const titleEl=$('#mixChartTitle');
  if(titleEl)titleEl.textContent=chartTitle;
  const top12=items.slice(0,12);
  const clrs=['#8b6914','#2563eb','#16a34a','#b45309','#dc2626','#7c3aed','#db2777','#059669','#ea580c','#4f46e5','#c026d3','#0891b2'];
  _mkChart('cMix',{type:'doughnut',data:{
    labels:top12.map(s=>s.verkaufsart),
    datasets:[{data:top12.map(s=>s.anzahl),backgroundColor:clrs,borderColor:'#ffffff',borderWidth:2}]
  },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{boxWidth:10,padding:6,font:{size:10}}}}}});
}

// ── VALIDIERUNG (L2) ──
function bValid(){
  const vals=(DATA.validierung||[]).map(v=>`<div class="alert alert-warn">⚠ ${v}</div>`).join('')||'<div class="alert alert-ok">✓ Keine Abweichungen</div>';
  const warns=(DATA.vvk_warnungen||[]).length?DATA.vvk_warnungen.map(w=>{if(typeof w==='string')return`<div class="alert alert-info">ℹ ${w}</div>`;return`<div class="alert alert-info">ℹ VA ${w.va_nr} (${w.va_name||''}): ${w.typ||''} — Erster VK: ${D(w.first_seen)}, Erwartet: ${D(w.expected_vvk)}</div>`}).join(''):'<div style="color:var(--text-dim);font-size:12px;padding:8px;">Keine VVK-Warnungen.</div>';
  const m=DATA.meta;
  return`<div class="panel l2-section" id="p-valid" role="tabpanel" aria-labelledby="tab-valid" tabindex="-1"><div class="sec-h">Validierung <span class="bdg bdg-b">Ebene 2</span></div><div class="alerts">${vals}</div><div class="sec-h" style="font-size:13px;margin-top:20px;">VVK-Warnungen</div><div class="alerts">${warns}</div><div class="sec-h" style="font-size:13px;margin-top:20px;">Meta</div><div class="kpi-row"><div class="kpi"><div class="kpi-label">Erstellt</div><div class="kpi-val" style="font-size:14px">${m.erstellt||'–'}</div></div><div class="kpi"><div class="kpi-label">Snapshots</div><div class="kpi-val">${m.anzahl_snapshots}</div><div class="kpi-sub">${m.snapshot_zeitraum}</div></div><div class="kpi"><div class="kpi-label">VA</div><div class="kpi-val">${m.gesamt_veranstaltungen}</div></div><div class="kpi"><div class="kpi-label">Produktionen</div><div class="kpi-val">${m.gesamt_produktionen}</div></div></div><div class="sec-h" style="font-size:13px;margin-top:20px;">Alpha-Score Modell</div><div class="kpi-row">${(()=>{const a=m.alpha_score_meta||{};const k=a.konditionszahl;const w=a.kondition_warnung;const kColor=w?'var(--danger,#dc2626)':k!=null&&k>15?'var(--accent)':'var(--ok,#16a34a)';const kLabel=w?'⚠ Multikollinearität':k!=null&&k>15?'akzeptabel':'gut';return`<div class="kpi"><div class="kpi-label">VA im Modell</div><div class="kpi-val">${a.n_vas??'–'}</div></div><div class="kpi"><div class="kpi-label">Konditionszahl κ</div><div class="kpi-val" style="color:${kColor}">${k!=null?k.toFixed(1):'–'}</div><div class="kpi-sub" style="color:${kColor}">${k!=null?kLabel:'kein Modell'}</div></div>`;})()}</div></div></div>`
}

// ── CHARTS ──
const _charts={};
function _mkChart(id,cfg){
  const el=document.getElementById(id);if(!el)return;
  if(el.offsetParent===null&&!l2)return;
  if(_charts[id]){_charts[id].destroy();delete _charts[id]}
  _charts[id]=new Chart(el,cfg);
}

// ── VVK-ANNOTATIONEN (S9) ──
// Gibt ein Annotations-Objekt für chartjs-plugin-annotation zurück.
// labels: Array der x-Achsen-Labels (DD.MM.YYYY), wie sie aus D(datum) entstehen.
// Liest DATA.veranstaltungen und extrahiert eindeutige vvk_start / vvk_offiziell-Daten.
function vvkAnnotations(labels){
  const vas=DATA.veranstaltungen||[];
  const gefunden={};
  const stufen=[
    {feld:'vvk_start',     label:'VVK Start',   color:'rgba(37,99,235,0.7)',  dash:[5,4]},
    {feld:'vvk_offiziell', label:'VVK Offiziell',color:'rgba(5,150,105,0.7)', dash:[5,4]},
  ];
  vas.forEach(v=>{
    stufen.forEach(s=>{
      const raw=v[s.feld];
      if(raw&&!gefunden[raw]) gefunden[raw]={...s,date:raw};
    });
  });
  const anns={};
  let i=0;
  Object.values(gefunden).forEach(f=>{
    const lbl=D(f.date);
    const idx=labels.indexOf(lbl);
    if(idx<0)return;
    anns[`vvk_${i++}`]={
      type:'line',
      xMin:idx,xMax:idx,
      borderColor:f.color,
      borderWidth:1.5,
      borderDash:f.dash,
      label:{
        display:true,
        content:f.label,
        position:'start',
        font:{size:9,weight:'normal'},
        color:f.color,
        backgroundColor:'rgba(255,255,255,0.88)',
        padding:{x:3,y:2},
        yAdjust:-6
      }
    };
  });
  return anns;
}

function initCharts(){
  Chart.defaults.color='#5a5a72';Chart.defaults.borderColor='#d8d8e2';Chart.defaults.font.family="Arial,Helvetica,sans-serif";Chart.defaults.font.size=11;
  const zr=DATA.zeitreihe_tagesverkauf||[];
  const labels=zr.map(d=>D(d.datum));
  const anns=vvkAnnotations(labels);
  _mkChart('cDaily',{type:'bar',data:{labels,datasets:[{data:zr.map(d=>d.tagesverkauf),backgroundColor:'rgba(139,105,20,0.35)',borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},annotation:{annotations:anns}},scales:{x:{grid:{display:false},ticks:{maxRotation:45}},y:{grid:{color:'#e6e6ee'}}}}});
  _mkChart('cCum',{type:'line',data:{labels,datasets:[{data:zr.map(d=>d.kumuliert),borderColor:'#8b6914',backgroundColor:'rgba(139,105,20,0.06)',fill:true,tension:0.3,pointRadius:2,pointHoverRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},annotation:{annotations:anns}},scales:{x:{grid:{display:false},ticks:{maxRotation:45}},y:{grid:{color:'#e6e6ee'}}}}});
  // Mix-Chart: wird bei Tab-Öffnung via initMixTab() initialisiert
}
// ── JS TOOLTIP (S11.5) ──
(function(){
  const tip=document.getElementById('js-tip');
  if(!tip)return;
  document.addEventListener('mouseover',e=>{
    const el=e.target.closest('.tip');
    if(!el){tip.style.opacity='0';return;}
    const txt=el.getAttribute('data-tip');
    if(!txt)return;
    tip.textContent=txt;
    tip.style.opacity='1';
  });
  document.addEventListener('mousemove',e=>{
    tip.style.left=(e.clientX+12)+'px';
    tip.style.top=(e.clientY-28)+'px';
  });
  document.addEventListener('mouseout',e=>{
    if(!e.target.closest('.tip'))tip.style.opacity='0';
  });
})();

// ── SWIPE-DRAWER (S11.5) ──
function openSwipe(){
  const ov=$('#swipeOverlay');if(!ov)return;
  // Dropdown befüllen
  const sel=$('#swipeProd');
  if(sel&&sel.options.length<=1){
    sel.innerHTML='<option value="">Alle Produktionen</option>'+
      [...new Set(aVA.map(v=>v.produktion))].sort().map(p=>`<option value="${p}">${p}</option>`).join('');
  }
  ov.classList.add('open');
  document.addEventListener('keydown',_escSwipe);
  renderSwipe();
}
function closeSwipe(){
  const ov=$('#swipeOverlay');if(ov)ov.classList.remove('open');
  document.removeEventListener('keydown',_escSwipe);
}
function _escSwipe(e){if(e.key==='Escape')closeSwipe();}
function renderSwipe(){
  const prod=$('#swipeProd')?$('#swipeProd').value:'';
  const vas=aVA.filter(v=>!prod||v.produktion===prod).slice(0,40);
  const wrap=$('#swipeCards');if(!wrap)return;
  if(!vas.length){wrap.innerHTML=`<div class="swipe-empty">Keine Veranstaltungen gefunden.</div>`;return;}
  wrap.innerHTML=vas.map(v=>{
    const pct=v.auslastung_verkauf_pct??v.auslastung_gesamt_pct;
    const col=pct==null?'var(--text-dim)':pct>=85?'var(--green)':pct>=70?'var(--blue)':pct>=50?'var(--yellow)':'var(--red)';
    const t1=v.tickets_1d;const t7=v.tickets_7d;
    const trendStr=t1!=null?(t1>0?'+':'')+t1:' –';
    const trendCol=t1>0?'var(--green)':t1<0?'var(--red)':'var(--text-dim)';
    return`<div class="swipe-card" onclick="closeSwipe();openVA(${v.va_nr})">
      <div class="swipe-card-name">${v.produktion}</div>
      <div class="swipe-card-date">${D(v.datum)} · ${v.uhrzeit||''}</div>
      <div class="swipe-card-ausl" style="color:${col}">${pct!=null?P(pct):'–'}</div>
      <div class="swipe-card-row"><span>Heute</span><strong style="color:${trendCol}">${trendStr}</strong></div>
      <div class="swipe-card-row"><span>7 Tage</span><strong>${t7!=null?F(t7):'–'}</strong></div>
      <div class="swipe-card-row"><span>Umsatz</span><strong>${eur(v.umsatz_gesamt||0)}</strong></div>
    </div>`;
  }).join('');
}

init();
</script>
