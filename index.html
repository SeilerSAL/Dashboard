<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schaubühne — Ticketing Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
  :root {
    --bg:#f8f8fa;--surface:#ffffff;--surface-2:#f0f0f4;--surface-3:#e6e6ee;
    --border:#d8d8e2;--border-light:#c8c8d4;
    --text:#1a1a2e;--text-muted:#5a5a72;--text-dim:#8a8aa0;
    --accent:#8b6914;--accent-hover:#a47d1c;--accent-dim:rgba(139,105,20,0.08);
    --green:#16a34a;--green-bg:rgba(22,163,74,0.06);
    --red:#dc2626;--red-bg:rgba(220,38,38,0.06);
    --yellow:#b45309;--yellow-bg:rgba(180,83,9,0.06);
    --blue:#2563eb;--blue-bg:rgba(37,99,235,0.06);
    --font:'DM Sans',-apple-system,sans-serif;--mono:Arial,Helvetica,sans-serif;
    --radius:6px;--radius-lg:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:linear-gradient(180deg,rgba(139,105,20,0.03)0%,transparent 100%)}
  .header h1{font-size:18px;font-weight:600;letter-spacing:-0.03em}.header h1 .sep{color:var(--border-light);margin:0 4px;font-weight:300}.header h1 .sub{color:var(--accent);font-weight:400;font-size:15px}
  .header-meta{font-size:11px;color:var(--text-dim);font-family:var(--mono);letter-spacing:0.02em}
  .btn{padding:6px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-muted);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s}.btn:hover{border-color:var(--border-light);color:var(--text)}
  .tabs{display:flex;gap:0;padding:0 28px;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
  .tab{padding:11px 18px;font-size:12.5px;font-weight:500;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none;white-space:nowrap}.tab:hover{color:var(--text-muted)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}.tab.l2{display:none}.tab.l2.unlocked{display:block}
  .main{padding:20px 28px 40px;max-width:1600px}.panel{display:none}.panel.active{display:block}
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;margin-bottom:12px}
  .kpi-row-hero{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:10px}
  .kpi-row-secondary{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:6px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;transition:border-color .2s}.kpi:hover{border-color:var(--border-light)}
  .kpi-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px;position:relative;overflow:hidden;transition:border-color .2s}
  .kpi-hero:hover{border-color:var(--border-light)}
  .kpi-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
  .kpi-hero.h-accent::before{background:var(--accent)}.kpi-hero.h-green::before{background:var(--green)}.kpi-hero.h-blue::before{background:var(--blue)}
  .kpi-hero .kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-muted);margin-bottom:8px;font-weight:600}
  .kpi-hero .kpi-val{font-size:32px;font-weight:700;font-family:var(--mono);letter-spacing:-0.04em;line-height:1.1}
  .kpi-hero .kpi-sub{font-size:12px;color:var(--text-dim);margin-top:6px;font-family:var(--mono)}
  .kpi-sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;transition:border-color .2s}.kpi-sec:hover{border-color:var(--border-light)}
  .kpi-sec .kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:3px;font-weight:500}
  .kpi-sec .kpi-val{font-size:18px;font-weight:600;font-family:var(--mono);letter-spacing:-0.03em;line-height:1.1}
  .kpi-sec .kpi-sub{font-size:10px;color:var(--text-dim);margin-top:2px;font-family:var(--mono)}
  .kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:5px;font-weight:500}
  .kpi-val{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:-0.04em;line-height:1.1}
  .kpi-sub{font-size:11px;color:var(--text-dim);margin-top:3px;font-family:var(--mono)}
  .color-legend{display:flex;gap:14px;align-items:center;padding:8px 0 14px;flex-wrap:wrap}
  .color-legend-item{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--text-muted)}
  .color-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .c-accent{color:var(--accent)}.c-green{color:var(--green)}.c-red{color:var(--red)}.c-yellow{color:var(--yellow)}.c-blue{color:var(--blue)}.c-muted{color:var(--text-muted)}
  .alerts{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
  .alert{padding:9px 14px;border-radius:var(--radius);font-size:12.5px;display:flex;align-items:center;gap:8px;line-height:1.4}
  .alert-danger{background:var(--red-bg);border:1px solid rgba(248,113,113,0.2);color:var(--red)}.alert-warn{background:var(--yellow-bg);border:1px solid rgba(251,191,36,0.2);color:var(--yellow)}.alert-ok{background:var(--green-bg);border:1px solid rgba(74,222,128,0.2);color:var(--green)}.alert-info{background:var(--blue-bg);border:1px solid rgba(96,165,250,0.2);color:var(--blue)}
  .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:20px}
  .tbl-head{padding:12px 16px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .tbl-count{font-size:11px;color:var(--text-dim);font-family:var(--mono)}.tbl-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;padding:9px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap;user-select:none;position:sticky;top:0;background:var(--surface)}
  td{padding:8px 12px;border-bottom:1px solid rgba(216,216,226,0.6);white-space:nowrap;font-family:var(--mono);font-size:11.5px}
  td.t{font-family:var(--font);font-size:12.5px}tr:hover td{background:rgba(139,105,20,0.04)}tr:last-child td{border-bottom:none}tr.clickable{cursor:pointer}.r{text-align:right}
  /* Sticky erste Spalte (S3) */
  .tbl-scroll th:first-child,.tbl-scroll td:first-child{position:sticky;left:0;z-index:2;background:var(--surface)}
  .tbl-scroll tr:hover td:first-child{background:rgba(139,105,20,0.04)}
  .tbl-scroll th:first-child::after,.tbl-scroll td:first-child::after{content:'';position:absolute;top:0;right:-6px;bottom:0;width:6px;pointer-events:none}
  .tbl-scroll.scrolled th:first-child::after,.tbl-scroll.scrolled td:first-child::after{background:linear-gradient(to right,rgba(0,0,0,0.06),transparent)}
  .bar{display:inline-flex;align-items:center;gap:6px;min-width:110px}.bar-track{flex:1;height:5px;background:var(--surface-3);border-radius:3px;overflow:hidden;min-width:50px}.bar-fill{height:100%;border-radius:3px;transition:width .3s ease}.bar-lbl{font-size:11px;font-family:var(--mono);min-width:40px;text-align:right}
  .bdg{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-weight:500}.bdg-g{background:rgba(22,163,74,0.1);color:var(--green)}.bdg-r{background:rgba(220,38,38,0.1);color:var(--red)}.bdg-y{background:rgba(180,83,9,0.1);color:var(--yellow)}.bdg-b{background:rgba(37,99,235,0.1);color:var(--blue)}.bdg-m{background:var(--surface-3);color:var(--text-dim)}
  .overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.25);backdrop-filter:blur(3px)}.overlay.open{display:flex;justify-content:flex-end}
  .slide{width:min(660px,92vw);height:100vh;background:var(--bg);border-left:1px solid var(--border);overflow-y:auto;padding:24px;animation:slideIn .2s ease}
  @keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
  .slide-close{float:right;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);font-size:16px;width:32px;height:32px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center}.slide-close:hover{color:var(--text)}
  .slide h2{font-size:20px;font-weight:600;margin-bottom:3px}.slide .meta{font-size:12px;color:var(--text-muted);font-family:var(--mono);margin-bottom:20px}
  .dg{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:18px}.dg label{font-size:10px;color:var(--text-dim);display:block;text-transform:uppercase;letter-spacing:.06em}.dg span{font-size:13px;font-family:var(--mono);font-weight:500}
  .dsec{margin-bottom:18px}.dsec h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
  .chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:20px}.chart-box h3{font-size:13px;font-weight:600;margin-bottom:14px}.chart-wrap{position:relative;height:280px}.chart-wrap canvas{width:100%!important;height:100%!important}
  .sec-h{font-size:14px;font-weight:600;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}.filters select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:7px 10px;font-size:12px;font-family:var(--font)}.filters select:focus{outline:none;border-color:var(--accent)}.filters label{font-size:11px;color:var(--text-dim)}
  .pw-ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.3);backdrop-filter:blur(6px);align-items:center;justify-content:center}.pw-ov.open{display:flex}
  .pw-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:min(360px,90vw);text-align:center}.pw-box h3{font-size:15px;margin-bottom:6px}.pw-box p{font-size:12px;color:var(--text-muted);margin-bottom:16px}
  .pw-box input{width:100%;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:var(--mono);margin-bottom:10px;text-align:center}.pw-box input:focus{outline:none;border-color:var(--accent)}
  .pw-btn{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-weight:600;font-size:13px;cursor:pointer}.pw-btn:hover{background:var(--accent-hover)}.pw-err{color:var(--red);font-size:11px;margin-top:6px;display:none}
  .l2-section{display:none}.l2-section.unlocked{display:block}
  .footer{padding:20px 28px;border-top:1px solid var(--border);text-align:center;font-size:10px;color:var(--text-dim);cursor:default;user-select:none}
  .sticky-col{position:sticky;left:0;z-index:2;background:var(--surface)}.sticky-col::after{content:'';position:absolute;top:0;bottom:0;right:-6px;width:6px;background:linear-gradient(90deg,rgba(0,0,0,0.04),transparent);pointer-events:none}
  tr:hover .sticky-col{background:rgba(139,105,20,0.04)}
  th[title]{cursor:help}
  th.sortable{cursor:pointer;position:relative;padding-right:18px;transition:color .15s}th.sortable:hover{color:var(--accent)}
  th.sortable .sort-ind{position:absolute;right:3px;top:50%;transform:translateY(-50%);font-size:9px;opacity:0.3;transition:opacity .15s;color:var(--text-dim);line-height:1}th.sortable:hover .sort-ind{opacity:0.6}th.sortable.asc .sort-ind,th.sortable.desc .sort-ind{opacity:1;color:var(--accent)}
  /* Tooltips (S3) */
  .tip{position:relative;cursor:help;border-bottom:1px dotted var(--text-dim)}.tip:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:10px;font-weight:400;letter-spacing:0;text-transform:none;white-space:nowrap;padding:4px 8px;border-radius:4px;z-index:10;pointer-events:none}
  /* Ampel (S5) */
  .ampel{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:11px;font-weight:700;cursor:default;flex-shrink:0}
  .amp-r{background:rgba(220,38,38,0.12);color:var(--red)}.amp-y{background:rgba(180,83,9,0.12);color:var(--yellow)}.amp-g{background:rgba(22,163,74,0.12);color:var(--green)}.amp-star{background:rgba(37,99,235,0.12);color:var(--blue)}
  /* Empfehlungs-Boxen (S5) */
  .rec-box{border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:16px}
  .rec-box-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .rec-box-orange{background:rgba(180,83,9,0.05);border:1px solid rgba(180,83,9,0.18)}.rec-box-orange .rec-box-header{color:var(--yellow)}
  .rec-box-blue{background:rgba(37,99,235,0.05);border:1px solid rgba(37,99,235,0.18)}.rec-box-blue .rec-box-header{color:var(--blue)}
  .rec-box-purple{background:rgba(124,58,237,0.05);border:1px solid rgba(124,58,237,0.18)}.rec-box-purple .rec-box-header{color:#7c3aed}
  .rec-box-red{background:rgba(220,38,38,0.05);border:1px solid rgba(220,38,38,0.18)}.rec-box-red .rec-box-header{color:var(--red)}
  .pg-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;margin-left:4px;vertical-align:middle}
  .pg-badge-orange{background:rgba(180,83,9,0.12);color:var(--yellow)}
  .pg-badge-blue{background:rgba(37,99,235,0.12);color:var(--blue)}
  .pg-badge-purple{background:rgba(124,58,237,0.12);color:#7c3aed}
  .panel-rec-summary{font-size:11.5px;padding:5px 10px;border-radius:var(--radius);margin-bottom:8px;font-weight:500}
  .panel-rec-summary-orange{background:rgba(180,83,9,0.07);color:var(--yellow);border:1px solid rgba(180,83,9,0.18)}
  .panel-rec-summary-blue{background:rgba(37,99,235,0.07);color:var(--blue);border:1px solid rgba(37,99,235,0.18)}
  .rec-item{font-size:12px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,0.04);line-height:1.45}.rec-item:last-child{border-bottom:none}
  .rec-prio{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:5px;font-family:var(--mono)}
  .prio-h{background:rgba(220,38,38,0.12);color:var(--red)}.prio-m{background:rgba(180,83,9,0.12);color:var(--yellow)}
  .rec-section{margin-bottom:20px}
  .rec-empty{font-size:12px;color:var(--text-dim);font-style:italic;padding:4px 0}
  /* L2 Empfehlungen Wrapper */
  .l2-rec-section{display:none}.l2-rec-section.unlocked{display:block}
  /* Suchfeld (S7) */
  .search-wrap{position:relative;flex:1;min-width:180px;max-width:320px}
  .search-wrap input{width:100%;padding:7px 10px 7px 30px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;font-family:var(--font);transition:border-color .15s}
  .search-wrap input:focus{outline:none;border-color:var(--accent)}
  .search-wrap input::placeholder{color:var(--text-dim)}
  .search-wrap .search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-dim);pointer-events:none}
  .search-wrap .search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--text-dim);cursor:pointer;display:none;background:none;border:none;padding:0;line-height:1}
  .search-wrap .search-clear:hover{color:var(--text)}
  /* Panel-Navigation Prev/Next (S7) */
  .panel-nav{display:flex;align-items:center;gap:6px;margin-bottom:4px}
  .panel-nav-btn{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-muted);font-size:13px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;user-select:none}
  .panel-nav-btn:hover:not(:disabled){border-color:var(--border-light);color:var(--text)}
  .panel-nav-btn:disabled{opacity:0.35;cursor:default}
  .panel-nav-pos{font-size:11px;color:var(--text-dim);font-family:var(--mono);min-width:48px;text-align:center}
  /* KPI-Monatsselektor (S8.5) */
  .kpi-month-nav{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .kpi-month-btn{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-muted);font-size:13px;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;user-select:none}
  .kpi-month-btn:hover{border-color:var(--border-light);color:var(--text)}
  .kpi-month-label{font-size:13px;font-weight:600;min-width:110px;text-align:center;font-family:var(--font)}
  .kpi-month-reset{font-size:11px;color:var(--text-dim);cursor:pointer;padding:3px 8px;border-radius:var(--radius);background:var(--surface-2);border:1px solid var(--border);transition:all .15s}
  .kpi-month-reset:hover{color:var(--text);border-color:var(--border-light)}
  .kpi-month-reset.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600}
  /* VVK-Annotationslegende (S9) */
  .ann-legend{display:flex;align-items:center;gap:14px;margin-bottom:10px;flex-wrap:wrap}
  .ann-leg-item{font-size:10px;font-weight:500;display:inline-flex;align-items:center;gap:5px;color:var(--text-muted)}
  .ann-leg-item::before{content:'';display:inline-block;width:18px;height:2px;border-top:2px dashed currentColor}
  .ann-leg-start{color:rgba(37,99,235,0.85)}
  .ann-leg-offiziell{color:rgba(5,150,105,0.85)}
  /* Keyboard-Fokus-Sichtbarkeit (S10) */
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:var(--radius)}
  .tab:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  .slide-close:focus-visible,.panel-nav-btn:focus-visible,.kpi-month-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  tr.clickable:focus-visible td{background:rgba(139,105,20,0.08)}
  tr.clickable:focus{outline:none}
  tr.clickable:focus-visible{outline:2px solid var(--accent);outline-offset:-1px}
  @media print{.header,.tabs,.footer,.btn,.filters{display:none!important}.tbl-wrap,.kpi,.kpi-hero,.kpi-sec,.chart-box{border-color:#ccc;box-shadow:none}.kpi-hero::before{print-color-adjust:exact;-webkit-print-color-adjust:exact}}
  @media(max-width:768px){.header,.main{padding-left:14px;padding-right:14px}.tabs{padding:0 14px}.kpi-row{grid-template-columns:repeat(2,1fr)}.kpi-row-hero{grid-template-columns:1fr}.kpi-row-secondary{grid-template-columns:repeat(2,1fr)}table{font-size:10.5px}td,th{padding:6px 8px}.slide{width:100vw}}
</style>
</head>
<body role="application" aria-label="Schaubühne Ticketing Dashboard">
<div class="header" role="banner">
  <div><h1>Schaubühne<span class="sep">·</span><span class="sub">Ticketing</span></h1></div>
  <div class="header-meta" id="hMeta">—</div>
  <div><button class="btn" onclick="window.print()" aria-label="Seite drucken">⎙ Drucken</button></div>
</div>

function ampelData(v,starred){
  const ausl=v.auslastung_verkauf_pct??v.auslastung_gesamt_pct??0;
  const d=dT(v.datum);
  if(starred){return{cls:'amp-star',sym:'★',title:'Potenzial: hohe Nachfrage'};}
  if((ausl<50&&d<=14)||(ausl<30&&d<=30)){return{cls:'amp-r',sym:'●',title:`Kritisch: ${P(ausl)} Auslastung, ${d}d`};}
  if(ausl<70&&d<=30){return{cls:'amp-y',sym:'●',title:`Aufmerksamkeit: ${P(ausl)} Auslastung, ${d}d`};}

}

// ── EMPFEHLUNGEN BERECHNEN (S5) ──
// va: gefiltertes Array der sichtbaren VAs
function calcRecs(va){
  // L1: Kontingent-Freigabe (orange)
  const freigabe=[];
  va.forEach(v=>{
    const auslVK=v.auslastung_verkauf_pct??v.auslastung_gesamt_pct??0;
    const d=dT(v.datum);
    if((v.freie_plaetze||0)<20&&(v.kontingente||0)>12&&d<=30){
      const prio=d<=14?'HOCH':'MITTEL';
      freigabe.push({v,auslVK,d,prio});
    }
  });
  freigabe.sort((a,b)=>a.d-b.d);

  // L1: Kritische VA (rot) – für KPI-Kontext
  let kritisch=0,aufKurs=0;
  va.forEach(v=>{
    const ausl=v.auslastung_verkauf_pct??v.auslastung_gesamt_pct??0;
    const d=dT(v.datum);
    if((ausl<50&&d<=14)||(ausl<30&&d<=30))kritisch++;
    else aufKurs++;
  });

  // L2: Preis-Empfehlungen (blau)
  const preis=[];
  va.forEach(v=>{
    const auslVK=v.auslastung_verkauf_pct??v.auslastung_gesamt_pct??0;
    const d=dT(v.datum);
    const frei=(v.freie_plaetze||0)/(v.kapazitaet||1)*100;
    const t7=v.tickets_7d||0;
    // Durchschnitt 7d aller VA dieser Produktion
    const prodVAs=aVA.filter(x=>x.produktion===v.produktion);
    const avg7=prodVAs.length>0?prodVAs.reduce((s,x)=>s+(x.tickets_7d||0),0)/prodVAs.length:0;
    if(auslVK>=70&&t7>avg7*2&&d>14&&frei>10){
      preis.push({v,auslVK,t7,avg7:Math.round(avg7),d});
    }
  });
  preis.sort((a,b)=>b.t7-a.t7);

  // L2: Preisdifferenzierung — benötigt PG-Daten (nicht immer vorhanden)
  // Wird aus platzgruppen-Array berechnet falls vorhanden
  const diff=[];
  va.forEach(v=>{
    if(!v.platzgruppen||!Array.isArray(v.platzgruppen))return;
    const pgs=v.platzgruppen.filter(p=>p.kapazitaet_vk>0);
    const high=pgs.filter(p=>p.auslastung_vk_pct>=80);
    const low=pgs.filter(p=>p.auslastung_vk_pct<60);
    if(high.length>0&&low.length>0){
      diff.push({v,high,low});
    }
  });

  // L2: Rush-Sale (rot) – niedrige Auslastung + bald
  const rush=[];
  va.forEach(v=>{
    const auslVK=v.auslastung_verkauf_pct??v.auslastung_gesamt_pct??0;
    const d=dT(v.datum);
    if(auslVK<50&&d<=14&&d>0){rush.push({v,auslVK,d});}
  });
  rush.sort((a,b)=>a.d-b.d);

  return{freigabe,kritisch,aufKurs,preis,diff,rush};
}

function buildRecL1(recs){
  let html='';
  if(recs.freigabe.length>0){
    const items=recs.freigabe.map(({v,auslVK,d,prio})=>{
      const prioHtml=`<span class="rec-prio prio-${prio==='HOCH'?'h':'m'}">${prio}</span>`;
      return`<div class="rec-item">${prioHtml}${v.produktion} (${D(v.datum)}) — ${P(auslVK)} VK-Auslastung, ${F(v.kontingente)} Kontingentplätze. <strong>Freigabe prüfen.</strong></div>`;
    }).join('');
    html+=`<div class="rec-box rec-box-orange"><div class="rec-box-header">📋 Kontingent-Freigabe</div>${items}</div>`;
  }
  return html;
}

// ── L2-EMPFEHLUNGS-HTML (S5) ──
function buildRecL2(recs){
  let html='';

  // Preis-Empfehlungen
  if(recs.preis.length>0){
    const items=recs.preis.map(({v,auslVK,t7,avg7,d})=>
      `<div class="rec-item">${v.produktion} (${D(v.datum)}) — ${F(t7)} Tickets/7d (⌀ Produktion: ${F(avg7)}), ${P(auslVK)} Ausl., noch ${d} Tage. <strong>Preiserhöhung prüfen.</strong></div>`
    ).join('');
    html+=`<div class="rec-box rec-box-blue"><div class="rec-box-header">💰 Preis-Empfehlungen</div>${items}</div>`;
  }

  // Differenzierung
  if(recs.diff.length>0){
    const items=recs.diff.map(({v,high,low})=>{
      const hStr=high.map(p=>`PG ${p.pg} ${P(p.auslastung_vk_pct)}`).join(', ');
      const lStr=low.map(p=>`PG ${p.pg} ${P(p.auslastung_vk_pct)}`).join(', ');
      return`<div class="rec-item">${v.produktion} (${D(v.datum)}) — ${hStr} ausgelastet, ${lStr} frei. <strong>Preisdifferenzierung prüfen.</strong></div>`;
    }).join('');
    html+=`<div class="rec-box rec-box-purple"><div class="rec-box-header">⚖️ Preisdifferenzierung</div>${items}</div>`;
  }

  // Rush-Sale
  if(recs.rush.length>0){
    const items=recs.rush.map(({v,auslVK,d})=>{
      const kont=v.kontingente>0?` · ${F(v.kontingente)} Kontingentplätze — Rücknahme möglich?`:'';
      return`<div class="rec-item">${v.produktion} (${D(v.datum)}) — ${P(auslVK)} Auslastung bei ${d} Tagen.${kont} <strong>Rush-Sale prüfen.</strong></div>`;
    }).join('');
    html+=`<div class="rec-box rec-box-red"><div class="rec-box-header">🔴 Sofort-Maßnahmen</div>${items}</div>`;
  }

  if(recs.preis.length===0&&recs.diff.length===0&&recs.rush.length===0){
    html+=`<p class="rec-empty">Keine Handlungsempfehlungen für aktuell gefilterte Veranstaltungen.</p>`;
  }
  return html;
}

const _sortState={};
function parseNum(txt){
  if(!txt||txt==='–'||txt==='-')return-Infinity;
  const clean=txt.replace(/<[^>]*>/g,'').trim();
  const bd=clean.match(/^(-?\d+)d$/);if(bd)return+bd[1];
  const dm=clean.match(/^(\d{2})\.(\d{2})\.(\d{4})/);if(dm)return+(dm[3]+dm[2]+dm[1]);
  const slash=clean.match(/^([\d.,]+)\s*\/\s*([\d.,]+)$/);if(slash)return+slash[1].replace('.','').replace(',','.');
  const pct=clean.match(/(-?[\d.,]+)\s*%/);if(pct)return+pct[1].replace('.','').replace(',','.');
  const cur=clean.replace(/[€\s]/g,'');
  const num=cur.replace(/\./g,'').replace(',','.');
  const v=parseFloat(num);
  return isNaN(v)?clean.toLowerCase():v;
}
function sortTable(tblEl,colIdx,thEl){
  const key=tblEl.id||tblEl.closest('.tbl-wrap')?.querySelector('.tbl-head')?.textContent||'t';

  Object.keys(_sortState).forEach(k=>{if(k.startsWith(key+'_'))delete _sortState[k]});
  _sortState[stateKey]=dir;
  thEl.classList.add(dir);
  const ind=thEl.querySelector('.sort-ind');if(ind)ind.textContent=dir==='asc'?'▲':'▼';
  const tbody=tblEl.querySelector('tbody');if(!tbody)return;
  const rows=Array.from(tbody.querySelectorAll('tr'));

    // Ampel-Spalte: data-amp Attribut des tr nutzen (0=rot,1=gelb,2=stern,3=grün)
    if(colIdx===14){
      const av=+(a.dataset.amp??9),bv=+(b.dataset.amp??9);
      return dir==='asc'?av-bv:bv-av;

    const ac=a.children[colIdx],bc=b.children[colIdx];

    if(typeof av==='string')av=-Infinity;if(typeof bv==='string')bv=-Infinity;

  });
  rows.forEach(r=>tbody.appendChild(r));

function _trapFocus(e){
  if(e.key!=='Tab')return;
  const panel=$('#slide');if(!panel)return;
  const focusable=Array.from(panel.querySelectorAll('button,input,select,textarea,[tabindex]:not([tabindex="-1"]),[href]')).filter(el=>!el.disabled&&el.offsetParent!==null);
  if(!focusable.length){e.preventDefault();return;}
  const first=focusable[0],last=focusable[focusable.length-1];
  if(e.shiftKey){if(document.activeElement===first){e.preventDefault();last.focus();}}
  else{if(document.activeElement===last){e.preventDefault();first.focus();}}
}

// ── PG-EMPFEHLUNGEN IM PANEL ──
function pgPanelRecs(v){
  const pgs=v.platzgruppen||[];
  if(!pgs.length)return{summaryHTML:'',badgeMap:{}};
  // Feldnamen: platzgruppe (Tabelle) = pg (calcRecs) -- beide moeglich
  const pgId=pg=>pg.pg||pg.platzgruppe||'?';
  const vkAusl=pg=>pg.auslastung_vk_pct!=null?pg.auslastung_vk_pct:pg.auslastung_gesamt_pct;
  // L1: Kontingent-Freigabe je PG
  const freigabePGs=pgs.filter(pg=>(pg.frei_verkaufbar||0)<20&&(pg.kontingente||0)>12);
  // L2: Preis-Badge je PG (ueberdurchschnittliche VK-Auslastung > 80%, mind. 2 PGs vorhanden)
  const aktivePGs=pgs.filter(pg=>(pg.kapazitaet_vk||pg.kapazitaet||0)>0);
  const avgVkAusl=aktivePGs.length?aktivePGs.reduce((s,pg)=>s+vkAusl(pg),0)/aktivePGs.length:0;
  const preisPGs=l2?pgs.filter(pg=>vkAusl(pg)>=80&&vkAusl(pg)>avgVkAusl+5):[];
  // L2: Differenzierungs-Badge (mind. eine PG >=80%, mind. eine <60%)
  const highPGs=l2?pgs.filter(pg=>vkAusl(pg)>=80):[];
  const lowPGs=l2?pgs.filter(pg=>vkAusl(pg)<60&&(pg.kapazitaet_vk||pg.kapazitaet||0)>0):[];
  const hasDiff=l2&&highPGs.length>0&&lowPGs.length>0;
  // Badge-Map: pgId -> HTML-Badges
  const badgeMap={};
  freigabePGs.forEach(pg=>{
    const id=pgId(pg);
    badgeMap[id]=(badgeMap[id]||'')+`<span class="pg-badge pg-badge-orange" title="${F(pg.frei_verkaufbar)} frei · ${F(pg.kontingente)} Kont. → Freigabe prüfen">Freigabe</span>`;
  });
  if(hasDiff){
    highPGs.forEach(pg=>{const id=pgId(pg);badgeMap[id]=(badgeMap[id]||'')+`<span class="pg-badge pg-badge-purple" title="Hoch vs. andere PGs → Differenzierung prüfen">Diff.</span>`;});
    lowPGs.forEach(pg=>{const id=pgId(pg);badgeMap[id]=(badgeMap[id]||'')+`<span class="pg-badge pg-badge-purple" title="Niedrig vs. andere PGs → Differenzierung prüfen">Diff.</span>`;});
  }
  preisPGs.filter(pg=>!hasDiff||(vkAusl(pg)>avgVkAusl+5)).forEach(pg=>{
    const id=pgId(pg);
    if(!hasDiff)badgeMap[id]=(badgeMap[id]||'')+`<span class="pg-badge pg-badge-blue" title="Überdurchschnittliche Nachfrage → Preiserhöhung prüfen">Preis↑</span>`;
  });
  // Zusammenfassung oben
  const totalHandlungL1=freigabePGs.length;
  const totalHandlungL2=l2?(new Set([...preisPGs.map(pgId),...(hasDiff?[...highPGs,...lowPGs].map(pgId):[])]).size):0;
  const total=totalHandlungL1+(totalHandlungL2>0?totalHandlungL2:0);
  let summaryHTML='';
  if(total>0){
    const parts=[];
    if(totalHandlungL1>0)parts.push(`<span class="pg-badge pg-badge-orange">${totalHandlungL1} Freigabe</span>`);
    if(l2&&hasDiff)parts.push(`<span class="pg-badge pg-badge-purple">Differenzierung</span>`);
    if(l2&&preisPGs.length>0&&!hasDiff)parts.push(`<span class="pg-badge pg-badge-blue">${preisPGs.length} Preis↑</span>`);
    summaryHTML=`<div class="panel-rec-summary panel-rec-summary-orange">${total} PG${total!==1?'s':''} mit Handlungsbedarf: ${parts.join(' ')}</div>`;
  }
  return{summaryHTML,badgeMap};
}

ss="r">Res.</th><th class="r">Frei VK</th></tr></thead><tbody>${pgR}</tbody></table></div></div>`;

function _buildProdRows(prods){
  return prods.map(x=>{
    const tk=x.tickets_kartenverkauf!=null?x.tickets_kartenverkauf:x.tickets_gesamt;
    return`<tr><td class="t">${x.name}</td><td class="r">${x.anzahl_veranstaltungen}</td><td class="r">${F(tk)}</td><td class="r">${F(x.kontingente||0)}</td><td class="r">${F(x.kapazitaet_gesamt)}</td><td>${bar(x.auslastung_pct)}</td><td class="r">${eur(x.umsatz_gesamt||0)}</td><td class="r" style="color:${dC(x.tickets_1d)}">${dF(x.tickets_1d||0)}</td><td class="r">${F(x.tickets_7d||0)}</td></tr>`;
  }).join('');
}

// Aggregiert VA-Daten zu Produktions-Kennzahlen für einen gefilterten VA-Subset
function _aggregateProds(filteredVA){
  const byProd={};
  filteredVA.forEach(v=>{
    const k=v.produktion;
    if(!byProd[k])byProd[k]={name:k,vaSet:new Set(),kv:0,kont:0,kap:0,umsatz:0,t1:0,t7_sum:0,t7_cnt:0};
    const p=byProd[k];
    p.vaSet.add(v.va_nr);
    p.kv+=KV(v);
    p.kont+=(v.kontingente||0);
    p.kap+=(v.kapazitaet||0);
    p.umsatz+=(v.umsatz_gesamt||0);
    p.t1+=(v.tickets_1d||0);
    if(v.tickets_7d!=null){p.t7_sum+=v.tickets_7d;p.t7_cnt++;}
  });
  return Object.values(byProd).map(p=>({
    name:p.name,
    anzahl_veranstaltungen:p.vaSet.size,
    tickets_kartenverkauf:p.kv,
    kontingente:p.kont,
    kapazitaet_gesamt:p.kap,
    auslastung_pct:p.kap>0?(p.kv/p.kap*100):0,
    umsatz_gesamt:p.umsatz,
    tickets_1d:p.t1,
    tickets_7d:p.t7_cnt>0?p.t7_sum:null
  })).sort((a,b)=>(b.auslastung_pct||0)-(a.auslastung_pct||0));
}

function filterProds(){
  const days=$('#fTimeProd')?$('#fTimeProd').value:'';
  // VA nach Zeitraum filtern
  let filteredVA;
  if(!days){
    filteredVA=aVA;
  } else if(days.startsWith('month:')){
    const m=days.slice(6);
    filteredVA=aVA.filter(v=>v.datum.startsWith(m));
  } else {
    filteredVA=aVA.filter(v=>dT(v.datum)<=+days);
  }
  const prods=_aggregateProds(filteredVA);
  const tbody=$('#prodTbody');
  if(tbody)tbody.innerHTML=_buildProdRows(prods);
  const cnt=$('#prodCount');if(cnt)cnt.textContent=prods.length;
  // Titel aktualisieren
  const label=days?(days.startsWith('month:')?fmtMonth(days.slice(6)):days+' Tage'):'gesamt';
  const titleEl=$('#prodChartTitle');if(titleEl)titleEl.textContent=`Auslastung nach Produktion (${label})`;
  // Chart neu rendern
  _mkChart('cProds',{type:'bar',data:{labels:prods.map(p=>p.name.length>22?p.name.slice(0,20)+'\u2026':p.name),datasets:[{data:prods.map(p=>p.auslastung_pct||0),backgroundColor:prods.map(p=>pC(p.auslastung_pct||0)),borderRadius:3,barThickness:18}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},annotation:{annotations:{ziel:{type:'line',xMin:70,xMax:70,borderColor:'rgba(5,150,105,0.45)',borderWidth:1.5,borderDash:[5,4],label:{display:true,content:'Ziel\u00a070\u202f%',position:'end',font:{size:9},color:'rgba(5,150,105,0.9)',backgroundColor:'rgba(255,255,255,0.88)',padding:{x:4,y:2}}}}}},scales:{x:{max:100,grid:{color:'#e6e6ee'}},y:{grid:{display:false}}}}});
  // Sortierung auf neue Tabellenzeilen anwenden
  const tbl=$('#tblProds');

}

// ── VERKAUFSMIX-TABELLE RENDERN ──
function renderMixTable(){
  const mix=DATA.verkaufsmix||[];
  const prod=$('#fMixProd')?$('#fMixProd').value:'';
  const byP={};
  mix.forEach(m=>{(byP[m.produktion]||(byP[m.produktion]=[])).push(m)});

  // Gefilterte Items aggregieren
  let items,title;
  if(!prod){
    // Alle Produktionen: Verkaufsarten summieren
    const agg={};
    mix.forEach(m=>{agg[m.verkaufsart]=(agg[m.verkaufsart]||0)+m.anzahl});
    items=Object.entries(agg).map(([v,n])=>({verkaufsart:v,anzahl:n})).sort((a,b)=>b.anzahl-a.anzahl);
    title='Alle Produktionen';
    // Chart auf gesamt updaten
    updateMixChart(null);
  } else {
    items=(byP[prod]||[]).sort((a,b)=>b.anzahl-a.anzahl);
    title=prod;
    // Chart auf Produktion updaten
    updateMixChart(prod);
  }

  const total=items.reduce((s,i)=>s+i.anzahl,0);
  const rows=items.map(i=>{const p=total>0?(i.anzahl/total*100):0;return`<tr><td class="t">${i.verkaufsart}</td><td class="r">${F(i.anzahl)}</td><td class="r" style="color:var(--text-dim);font-size:11px;font-family:var(--mono)">${P(p)}</td><td>${bar(p)}</td></tr>`}).join('');
  const wrap=$('#mixTblWrap');
  if(wrap){
    wrap.innerHTML=`<div class="tbl-wrap"><div class="tbl-head">${title} <span class="tbl-count">${F(total)} Tickets · ${items.length} Verkaufsarten</span></div><div class="tbl-scroll"><table id="tblMix"><thead><tr><th>Verkaufsart</th><th class="r">Anzahl</th><th class="r">Anteil&nbsp;%</th><th>Anteil</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    // Sortierung auf neue Tabelle anwenden
    const tbl=$('#tblMix');
    if(tbl){
      tbl.querySelectorAll('th').forEach((th,i)=>{
        const txt=th.textContent.trim();
        if(txt==='Anteil')return;
        if(th.classList.contains('sortable'))return;
        th.classList.add('sortable');
        th.innerHTML=th.innerHTML+'<span class="sort-ind">↕</span>';
        th.addEventListener('click',()=>sortTable(tbl,i,th));
      });
    }
  }
}

// ── VVK-ANNOTATIONEN (S9) ──
// Gibt ein Annotations-Objekt für chartjs-plugin-annotation zurück.
// labels: Array der x-Achsen-Labels (DD.MM.YYYY), wie sie aus D(datum) entstehen.
// Liest DATA.veranstaltungen und extrahiert eindeutige vvk_start / vvk_offiziell-Daten.
function vvkAnnotations(labels){
  const vas=DATA.veranstaltungen||[];
  const gefunden={};
  const stufen=[
    {feld:'vvk_start',     label:'VVK Start',   color:'rgba(37,99,235,0.7)',  dash:[5,4]},
    {feld:'vvk_offiziell', label:'VVK Offiziell',color:'rgba(5,150,105,0.7)', dash:[5,4]},
  ];
  vas.forEach(v=>{
    stufen.forEach(s=>{
      const raw=v[s.feld];
      if(raw&&!gefunden[raw]) gefunden[raw]={...s,date:raw};
    });
  });
  const anns={};
  let i=0;
  Object.values(gefunden).forEach(f=>{
    const lbl=D(f.date);
    const idx=labels.indexOf(lbl);
    if(idx<0)return;
    anns[`vvk_${i++}`]={
      type:'line',
      xMin:idx,xMax:idx,
      borderColor:f.color,
      borderWidth:1.5,
      borderDash:f.dash,
      label:{
        display:true,
        content:f.label,
        position:'start',
        font:{size:9,weight:'normal'},
        color:f.color,
        backgroundColor:'rgba(255,255,255,0.88)',
        padding:{x:3,y:2},
        yAdjust:-6
      }
    };
  });
  return anns;
}

function initCharts(){
  Chart.defaults.color='#5a5a72';Chart.defaults.borderColor='#d8d8e2';Chart.defaults.font.family="Arial,Helvetica,sans-serif";Chart.defaults.font.size=11;
  // cProds wird von filterProds() gerendert (Tab-aktiviert)
  const zr=DATA.zeitreihe_tagesverkauf||[];
  const labels=zr.map(d=>D(d.datum));
  const anns=vvkAnnotations(labels);
  _mkChart('cDaily',{type:'bar',data:{labels,datasets:[{data:zr.map(d=>d.tagesverkauf),backgroundColor:'rgba(139,105,20,0.35)',borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},annotation:{annotations:anns}},scales:{x:{grid:{display:false},ticks:{maxRotation:45}},y:{grid:{color:'#e6e6ee'}}}}});
