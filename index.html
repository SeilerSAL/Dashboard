<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schaubühne — Ticketing Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
  :root {
    --bg:#f8f8fa;--surface:#ffffff;--surface-2:#f0f0f4;--surface-3:#e6e6ee;
    --border:#d8d8e2;--border-light:#c8c8d4;
    --text:#1a1a2e;--text-muted:#5a5a72;--text-dim:#8a8aa0;
    --accent:#8b6914;--accent-hover:#a47d1c;--accent-dim:rgba(139,105,20,0.08);
    --green:#16a34a;--green-bg:rgba(22,163,74,0.06);
    --red:#dc2626;--red-bg:rgba(220,38,38,0.06);
    --yellow:#b45309;--yellow-bg:rgba(180,83,9,0.06);
    --blue:#2563eb;--blue-bg:rgba(37,99,235,0.06);
    --font:'DM Sans',-apple-system,sans-serif;--mono:Arial,Helvetica,sans-serif;
    --radius:6px;--radius-lg:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .header{padding:20px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:linear-gradient(180deg,rgba(139,105,20,0.03)0%,transparent 100%)}
  .header h1{font-size:18px;font-weight:600;letter-spacing:-0.03em}.header h1 .sep{color:var(--border-light);margin:0 4px;font-weight:300}.header h1 .sub{color:var(--accent);font-weight:400;font-size:15px}
  .header-meta{font-size:11px;color:var(--text-dim);font-family:var(--mono);letter-spacing:0.02em}
  .btn{padding:6px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-muted);font-size:12px;cursor:pointer;font-family:var(--font);transition:all .15s}.btn:hover{border-color:var(--border-light);color:var(--text)}
  .tabs{display:flex;gap:0;padding:0 28px;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
  .tab{padding:11px 18px;font-size:12.5px;font-weight:500;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none;white-space:nowrap}.tab:hover{color:var(--text-muted)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}.tab.l2{display:none}.tab.l2.unlocked{display:block}
  .main{padding:20px 28px 40px;max-width:1600px}.panel{display:none}.panel.active{display:block}
  .kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;margin-bottom:20px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;transition:border-color .2s}.kpi:hover{border-color:var(--border-light)}
  .kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:5px;font-weight:500}
  .kpi-val{font-size:24px;font-weight:700;font-family:var(--mono);letter-spacing:-0.04em;line-height:1.1}
  .kpi-sub{font-size:11px;color:var(--text-dim);margin-top:3px;font-family:var(--mono)}
  .c-accent{color:var(--accent)}.c-green{color:var(--green)}.c-red{color:var(--red)}.c-yellow{color:var(--yellow)}.c-blue{color:var(--blue)}.c-muted{color:var(--text-muted)}
  .alerts{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
  .alert{padding:9px 14px;border-radius:var(--radius);font-size:12.5px;display:flex;align-items:center;gap:8px;line-height:1.4}
  .alert-danger{background:var(--red-bg);border:1px solid rgba(248,113,113,0.2);color:var(--red)}.alert-warn{background:var(--yellow-bg);border:1px solid rgba(251,191,36,0.2);color:var(--yellow)}.alert-ok{background:var(--green-bg);border:1px solid rgba(74,222,128,0.2);color:var(--green)}.alert-info{background:var(--blue-bg);border:1px solid rgba(96,165,250,0.2);color:var(--blue)}
  .tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:20px}
  .tbl-head{padding:12px 16px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .tbl-count{font-size:11px;color:var(--text-dim);font-family:var(--mono)}.tbl-scroll{overflow:auto;max-height:70vh}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;padding:9px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-dim);border-bottom:1px solid var(--border);white-space:nowrap;user-select:none;position:sticky;top:0;background:var(--surface);z-index:2}
  th:first-child{position:sticky;left:0;z-index:3;background:var(--surface)}
  td{padding:8px 12px;border-bottom:1px solid rgba(216,216,226,0.6);white-space:nowrap;font-family:var(--mono);font-size:11.5px}
  td:first-child{position:sticky;left:0;background:var(--surface);z-index:1;border-right:1px solid var(--border)}
  td.t{font-family:var(--font);font-size:12.5px}tr:hover td{background:rgba(139,105,20,0.04)}tr:hover td:first-child{background:var(--surface-2)}tr:last-child td{border-bottom:none}tr.clickable{cursor:pointer}.r{text-align:right}
  .bar{display:inline-flex;align-items:center;gap:6px;min-width:110px}.bar-track{flex:1;height:5px;background:var(--surface-3);border-radius:3px;overflow:hidden;min-width:50px}.bar-fill{height:100%;border-radius:3px;transition:width .3s ease}.bar-lbl{font-size:11px;font-family:var(--mono);min-width:40px;text-align:right}
  .bdg{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;font-family:var(--mono);font-weight:500}.bdg-g{background:rgba(22,163,74,0.1);color:var(--green)}.bdg-r{background:rgba(220,38,38,0.1);color:var(--red)}.bdg-y{background:rgba(180,83,9,0.1);color:var(--yellow)}.bdg-b{background:rgba(37,99,235,0.1);color:var(--blue)}.bdg-m{background:var(--surface-3);color:var(--text-dim)}
  .overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.25);backdrop-filter:blur(3px)}.overlay.open{display:flex;justify-content:flex-end}
  .slide{width:min(660px,92vw);height:100vh;background:var(--bg);border-left:1px solid var(--border);overflow-y:auto;padding:24px;animation:slideIn .2s ease}
  @keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
  .slide-close{float:right;background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);font-size:16px;width:32px;height:32px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center}.slide-close:hover{color:var(--text)}
  .slide h2{font-size:20px;font-weight:600;margin-bottom:3px}.slide .meta{font-size:12px;color:var(--text-muted);font-family:var(--mono);margin-bottom:20px}
  .dg{display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;margin-bottom:18px}.dg label{font-size:10px;color:var(--text-dim);display:block;text-transform:uppercase;letter-spacing:.06em}.dg span{font-size:13px;font-family:var(--mono);font-weight:500}
  .dsec{margin-bottom:18px}.dsec h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)}
  .chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:20px}.chart-box h3{font-size:13px;font-weight:600;margin-bottom:14px}.chart-wrap{position:relative;height:280px}.chart-wrap canvas{width:100%!important;height:100%!important}
  .sec-h{font-size:14px;font-weight:600;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}.filters select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:7px 10px;font-size:12px;font-family:var(--font)}.filters select:focus{outline:none;border-color:var(--accent)}.filters label{font-size:11px;color:var(--text-dim)}
  .pw-ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.3);backdrop-filter:blur(6px);align-items:center;justify-content:center}.pw-ov.open{display:flex}
  .pw-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:min(360px,90vw);text-align:center}.pw-box h3{font-size:15px;margin-bottom:6px}.pw-box p{font-size:12px;color:var(--text-muted);margin-bottom:16px}
  .pw-box input{width:100%;padding:9px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:var(--mono);margin-bottom:10px;text-align:center}.pw-box input:focus{outline:none;border-color:var(--accent)}
  .pw-btn{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-weight:600;font-size:13px;cursor:pointer}.pw-btn:hover{background:var(--accent-hover)}.pw-err{color:var(--red);font-size:11px;margin-top:6px;display:none}
  .l2-section{display:none}.l2-section.unlocked{display:block}
  .footer{padding:20px 28px;border-top:1px solid var(--border);text-align:center;font-size:10px;color:var(--text-dim);cursor:default;user-select:none}
  @media print{.header,.tabs,.footer,.btn,.filters{display:none!important}.tbl-wrap,.kpi,.chart-box{border-color:#ccc;box-shadow:none}}
  @media(max-width:768px){.header,.main{padding-left:14px;padding-right:14px}.tabs{padding:0 14px}.kpi-row{grid-template-columns:repeat(2,1fr)}table{font-size:10.5px}td,th{padding:6px 8px}.slide{width:100vw}}
</style>
</head>
<body>
<div class="header">
  <div><h1>Schaubühne<span class="sep">·</span><span class="sub">Ticketing</span></h1></div>
  <div class="header-meta" id="hMeta">—</div>
  <div><button class="btn" onclick="window.print()">⎙ Drucken</button></div>
</div>
<div class="tabs" id="tabBar">
  <div class="tab active" data-t="overview">Übersicht</div>
  <div class="tab" data-t="events">Veranstaltungen</div>
  <div class="tab" data-t="prods">Produktionen</div>
  <div class="tab l2" data-t="vadetail">VA-Detail</div>
  <div class="tab l2" data-t="timeline">Zeitreihe</div>
  <div class="tab l2" data-t="mix">Verkaufsmix</div>
  <div class="tab l2" data-t="valid">Validierung</div>
</div>
<div class="main" id="main"></div>
<div class="overlay" id="overlay"><div class="slide" id="slide"></div></div>
<div class="pw-ov" id="pwOv"><div class="pw-box"><h3>Erweiterte Ansicht</h3><p>Zugang nur für autorisierte Nutzer.</p><input type="password" id="pwIn" placeholder="Passwort" autofocus><br><button class="pw-btn" onclick="checkPw()">Entsperren</button><div class="pw-err" id="pwErr">Falsches Passwort.</div></div></div>
<div class="footer" id="footer">Schaubühne am Lehniner Platz · Ticketing Dashboard · EVENTIM.INHOUSE</div>
<script>
// ╔══════════════════════════════════════════════════════════════════════════╗
// ║  DATEN — Wird von ticketing_pipeline.py automatisch ersetzt.            ║
// ║  Python: re.sub(r'// __DATA_START__.*?// __DATA_END__', repl, html)    ║
// ╚══════════════════════════════════════════════════════════════════════════╝
// __DATA_START__
const DATA = {"meta":{"erstellt":"2026-03-03T10:00:00","aktuellster_snapshot":"2026-03-03","anzahl_snapshots":31,"snapshot_zeitraum":"2026-02-01 bis 2026-03-03","gesamt_veranstaltungen":106,"gesamt_produktionen":23},"veranstaltungen":[],"produktionen":[],"zeitreihe_tagesverkauf":[],"verkaufsmix":[],"vvk_warnungen":[],"validierung":["Beispieldaten — bitte Pipeline ausführen"]};
// __DATA_END__

const PW_HASH='ba534b69f9010c984d0467b1ac09a1ff5eec46b7487f0960056e6a44203977b2';
let footerClicks=0,footerTimer=null,l2=false;
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const today=new Date().toISOString().split('T')[0];
const F=(v,d=0)=>v==null||isNaN(v)?'–':Number(v).toLocaleString('de-DE',{minimumFractionDigits:d,maximumFractionDigits:d});
const eur=v=>v==null||isNaN(v)?'–':Number(v).toLocaleString('de-DE',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0});
const P=v=>v==null||isNaN(v)?'–':F(v,1)+'%';
const D=d=>{if(!d||d==='None')return'–';const p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0]};
const dT=d=>{const n=new Date();n.setHours(0,0,0,0);return Math.ceil((new Date(d)-n)/864e5)};
const pC=v=>v>=90?'var(--green)':v>=70?'var(--blue)':v>=50?'var(--yellow)':'var(--red)';
const vL=p=>({foerderer:'Förderer',freundeskreis:'Freundeskreis',offiziell:'Offiziell'}[p]||p||'–');
const KV=v=>v.tickets_kartenverkauf!=null?v.tickets_kartenverkauf:v.tickets_gesamt;
const dC=v=>(v||0)>0?'var(--green)':(v||0)<0?'var(--red)':'var(--text-dim)';
const dF=v=>v>0?'+'+F(v):F(v);
function bar(val,lbl){const c=Math.min(Math.max(val||0,0),100),clr=pC(val||0);return`<div class="bar"><div class="bar-track"><div class="bar-fill" style="width:${c}%;background:${clr}"></div></div><div class="bar-lbl" style="color:${clr}">${lbl||P(val)}</div></div>`}
function dB(d){return d<=7?'bdg-r':d<=14?'bdg-y':'bdg-m'}
const aVA=(DATA.veranstaltungen||[]).filter(v=>v.datum>=today).sort((a,b)=>new Date(a.datum)-new Date(b.datum));

function init(){
  const m=DATA.meta;
  $('#hMeta').textContent=`Stand ${D(m.aktuellster_snapshot)} · ${m.anzahl_snapshots} Snapshots · ${m.gesamt_veranstaltungen} VA · ${m.gesamt_produktionen} Prod.`;
  $('#main').innerHTML=bOverview()+bEvents()+bProds()+bVADetail()+bTimeline()+bMix()+bValid();
  initTabs();initFooter();setTimeout(initCharts,80);
}
function initTabs(){$$('.tab').forEach(t=>t.addEventListener('click',()=>{$$('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');$$('.panel').forEach(p=>p.classList.remove('active'));const g=$(`#p-${t.dataset.t}`);if(g)g.classList.add('active')}))}
function initFooter(){$('#footer').addEventListener('click',()=>{if(l2)return;footerClicks++;clearTimeout(footerTimer);footerTimer=setTimeout(()=>footerClicks=0,2000);if(footerClicks>=5){footerClicks=0;$('#pwOv').classList.add('open');$('#pwIn').focus()}});$('#pwIn').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw()});$('#pwOv').addEventListener('click',e=>{if(e.target===$('#pwOv'))$('#pwOv').classList.remove('open')})}
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
async function checkPw(){const h=await sha256($('#pwIn').value);if(h===PW_HASH){l2=true;$('#pwOv').classList.remove('open');$$('.l2').forEach(el=>el.classList.add('unlocked'));$$('.l2-section').forEach(el=>el.classList.add('unlocked'));setTimeout(initCharts,80)}else{$('#pwErr').style.display='block';$('#pwIn').value='';setTimeout(()=>$('#pwErr').style.display='none',2000)}}

// ── ÜBERSICHT ──
function bOverview(){
  const a=aVA,tKV=a.reduce((s,v)=>s+KV(v),0),tKap=a.reduce((s,v)=>s+(v.kapazitaet||0),0),tUms=a.reduce((s,v)=>s+(v.umsatz_gesamt||0),0),tKon=a.reduce((s,v)=>s+(v.kontingente||0),0),tFrei=a.reduce((s,v)=>s+(v.freie_plaetze||0),0),tRes=a.reduce((s,v)=>s+(v.reserviert||0),0);
  const avgA=tKap>0?(tKV/tKap*100):0,fvk=tKap-tKon,auslVK=fvk>0?(tKV/fvk*100):0;
  const t1=a.reduce((s,v)=>s+(v.tickets_1d||0),0),t7=a.reduce((s,v)=>s+(v.tickets_7d||0),0);
  let al='';a.forEach(v=>{const d=dT(v.datum);if(d<=14&&v.auslastung_gesamt_pct!=null&&v.auslastung_gesamt_pct<50)al+=`<div class="alert alert-danger">⚠ ${v.produktion} (${D(v.datum)}) — unter 50% bei nur ${d} Tagen bis VA</div>`;if((v.tickets_1d||0)>=15)al+=`<div class="alert alert-ok">▲ ${v.produktion} (${D(v.datum)}) — ${v.tickets_1d} Tickets heute</div>`});
  if(al)al=`<div class="alerts">${al}</div>`;
  const rows=a.map(v=>{const d=dT(v.datum);return`<tr class="clickable" onclick="openVA(${v.va_nr})"><td class="t">${v.produktion}</td><td>${D(v.datum)}</td><td>${v.uhrzeit||''}</td><td class="r"><span class="bdg ${dB(d)}">${d}d</span></td><td class="r">${F(KV(v))}</td><td class="r">${F(v.kapazitaet)}</td><td>${bar(v.auslastung_gesamt_pct)}</td><td class="r">${F(v.kontingente)}</td><td class="r">${F(v.reserviert)}</td><td class="r">${F(v.freie_plaetze)}</td><td class="r">${eur(v.umsatz_gesamt)}</td><td class="r" style="color:${dC(v.tickets_1d)}">${dF(v.tickets_1d)}</td><td class="r">${F(v.tickets_7d)}</td></tr>`}).join('');
  return`<div class="panel active" id="p-overview"><div class="kpi-row"><div class="kpi"><div class="kpi-label">Aktive VA</div><div class="kpi-val">${a.length}</div><div class="kpi-sub">im Verkauf</div></div><div class="kpi"><div class="kpi-label">Kartenverkauf</div><div class="kpi-val c-accent">${F(tKV)}</div><div class="kpi-sub">von ${F(tKap)} Kapazität</div></div><div class="kpi"><div class="kpi-label">⌀ Auslastung (Ges.)</div><div class="kpi-val" style="color:${pC(avgA)}">${P(avgA)}</div><div class="kpi-sub">VK-Ausl.: ${P(auslVK)}</div></div><div class="kpi"><div class="kpi-label">Umsatz</div><div class="kpi-val">${eur(tUms)}</div><div class="kpi-sub">aktive VA</div></div><div class="kpi"><div class="kpi-label">Heute / 7 Tage</div><div class="kpi-val c-green">${F(t1)} / ${F(t7)}</div><div class="kpi-sub">Neuverkäufe</div></div><div class="kpi"><div class="kpi-label">Kontingente</div><div class="kpi-val c-muted">${F(tKon)}</div><div class="kpi-sub">nicht VK</div></div><div class="kpi"><div class="kpi-label">Reserviert</div><div class="kpi-val c-yellow">${F(tRes)}</div><div class="kpi-sub">unbezahlt</div></div><div class="kpi"><div class="kpi-label">Freie Plätze</div><div class="kpi-val">${F(tFrei)}</div><div class="kpi-sub">verfügbar</div></div></div>${al}<div class="tbl-wrap"><div class="tbl-head">Aktuelle Veranstaltungen <span class="tbl-count">${a.length}</span></div><div class="tbl-scroll"><table><thead><tr><th>Produktion</th><th>Datum</th><th>Zeit</th><th class="r">Tage</th><th class="r">KV</th><th class="r">Kap.</th><th>Auslastung</th><th class="r">Kont.</th><th class="r">Res.</th><th class="r">Frei</th><th class="r">Umsatz</th><th class="r">1d</th><th class="r">7d</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`
}

// ── VERANSTALTUNGEN ──
function bEvents(){
  const a=aVA,prods=[...new Set(a.map(v=>v.produktion))].sort(),opts=prods.map(p=>`<option value="${p}">${p}</option>`).join('');
  const rows=a.map(v=>{const d=dT(v.datum),vC=v.vvk_phase==='foerderer'?'bdg-b':v.vvk_phase==='freundeskreis'?'bdg-y':'bdg-g';return`<tr class="clickable va-row" data-p="${v.produktion}" onclick="openVA(${v.va_nr})"><td class="t">${v.produktion}</td><td>${D(v.datum)} ${v.uhrzeit||''}</td><td class="r"><span class="bdg ${dB(d)}">${d}d</span></td><td class="r">${F(KV(v))} / ${F(v.kapazitaet)}</td><td>${bar(v.auslastung_gesamt_pct)}</td><td>${bar(v.auslastung_verkauf_pct,P(v.auslastung_verkauf_pct))}</td><td class="r">${F(v.kontingente)}</td><td class="r">${F(v.freie_plaetze)}</td><td class="r">${eur(v.umsatz_gesamt)}</td><td class="r" style="color:${dC(v.tickets_1d)}">${dF(v.tickets_1d)}</td><td class="r">${F(v.tickets_3d)}</td><td class="r">${F(v.tickets_7d)}</td><td><span class="bdg ${vC}">${vL(v.vvk_phase)}</span></td></tr>`}).join('');
  return`<div class="panel" id="p-events"><div class="filters"><label>Produktion:</label><select id="fProd" onchange="fVA()"><option value="">Alle</option>${opts}</select></div><div class="tbl-wrap"><div class="tbl-head">Veranstaltungen im Verkauf <span class="tbl-count">${a.length}</span></div><div class="tbl-scroll"><table><thead><tr><th>Produktion</th><th>Datum/Zeit</th><th class="r">Tage</th><th class="r">KV / Kap.</th><th>Ausl. Ges.</th><th>Ausl. VK</th><th class="r">Kont.</th><th class="r">Frei</th><th class="r">Umsatz</th><th class="r">1d</th><th class="r">3d</th><th class="r">7d</th><th>VVK</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`
}
function fVA(){const p=$('#fProd').value;$$('.va-row').forEach(r=>r.style.display=(!p||r.dataset.p===p)?'':'none')}

// ── DETAIL ──
function openVA(nr){
  const v=DATA.veranstaltungen.find(x=>x.va_nr===nr);if(!v)return;const d=dT(v.datum),tk=KV(v);
  const pgR=(v.platzgruppen||[]).map(pg=>`<tr><td>${pg.platzgruppe.toUpperCase()}</td><td class="r">${F(pg.verkauft)}</td><td class="r">${F(pg.kapazitaet)}</td><td>${bar(pg.auslastung_gesamt_pct)}</td><td class="r">${F(pg.kontingente)}</td><td class="r">${F(pg.reserviert)}</td><td class="r">${F(pg.frei_verkaufbar)}</td></tr>`).join('');
  $('#slide').innerHTML=`<button class="slide-close" onclick="closeVA()">✕</button><h2>${v.produktion}</h2><div class="meta">${D(v.datum)} · ${v.uhrzeit||''} · VA ${v.va_nr} · ${d} Tage</div><div class="dsec"><h3>Kennzahlen</h3><div class="dg"><div><label>Kartenverkauf</label><span>${F(tk)}</span></div><div><label>Kontingente</label><span>${F(v.kontingente)}</span></div><div><label>Gesamt (inkl. Kont.)</label><span style="color:var(--text-muted)">${F(v.tickets_gesamt)}</span></div><div><label>Kapazität</label><span>${F(v.kapazitaet)}</span></div><div><label>Ausl. Gesamt</label><span style="color:${pC(v.auslastung_gesamt_pct)}">${P(v.auslastung_gesamt_pct)}</span></div><div><label>Ausl. VK</label><span style="color:${pC(v.auslastung_verkauf_pct)}">${P(v.auslastung_verkauf_pct)}</span></div><div><label>Umsatz</label><span>${eur(v.umsatz_gesamt)}</span></div><div><label>Reserviert</label><span>${F(v.reserviert)}</span></div><div><label>Freie Plätze</label><span>${F(v.freie_plaetze)}</span></div></div></div><div class="dsec"><h3>Verkaufsdynamik</h3><div class="dg"><div><label>Heute (1d)</label><span style="color:${dC(v.tickets_1d)}">${dF(v.tickets_1d)}</span></div><div><label>3 Tage</label><span style="color:${dC(v.tickets_3d)}">${dF(v.tickets_3d)}</span></div><div><label>7 Tage</label><span style="color:${dC(v.tickets_7d)}">${dF(v.tickets_7d)}</span></div><div><label>30 Tage</label><span style="color:${dC(v.tickets_30d)}">${dF(v.tickets_30d)}</span></div></div></div><div class="dsec"><h3>VVK</h3><div class="dg"><div><label>Start</label><span>${D(v.vvk_start)}</span></div><div><label>Phase</label><span>${vL(v.vvk_phase)}</span></div><div><label>Offiziell</label><span>${D(v.vvk_offiziell)}</span></div></div></div><div class="dsec"><h3>Platzgruppen</h3><div class="tbl-scroll"><table><thead><tr><th>PG</th><th class="r">Verk.</th><th class="r">Kap.</th><th>Auslastung</th><th class="r">Kont.</th><th class="r">Res.</th><th class="r">Frei VK</th></tr></thead><tbody>${pgR}</tbody></table></div></div>`;
  $('#overlay').classList.add('open');document.addEventListener('keydown',escVA)
}
function closeVA(){$('#overlay').classList.remove('open');document.removeEventListener('keydown',escVA)}
function escVA(e){if(e.key==='Escape')closeVA()}
$('#overlay').addEventListener('click',e=>{if(e.target===$('#overlay'))closeVA()});

// ── PRODUKTIONEN (v34: Umsatz, 1d, 7d, KV, Kontingente) ──
function bVADetail(){
  const a=aVA;
  const prods=[...new Set(a.map(v=>v.produktion))].sort();
  const opts=prods.map(p=>`<option value="${p}">${p}</option>`).join('');
  const rows=a.map(v=>{const d=dT(v.datum);const vC=v.vvk_phase==='foerderer'?'bdg-b':v.vvk_phase==='freundeskreis'?'bdg-y':'bdg-g';
    return`<tr class="clickable vad-row" data-p="${v.produktion}" onclick="openVA(${v.va_nr})">
      <td class="t">${v.produktion}</td>
      <td>${D(v.datum)} ${v.uhrzeit||''}</td>
      <td class="r"><span class="bdg ${dB(d)}">${d}d</span></td>
      <td class="r">${F(KV(v))}</td>
      <td class="r">${F(v.tickets_gesamt)}</td>
      <td class="r">${F(v.kontingente)}</td>
      <td class="r">${F(v.kapazitaet)}</td>
      <td class="r">${F(v.frei_verkaufbar)}</td>
      <td>${bar(v.auslastung_gesamt_pct)}</td>
      <td>${bar(v.auslastung_verkauf_pct,P(v.auslastung_verkauf_pct))}</td>
      <td class="r">${F(v.reserviert)}</td>
      <td class="r">${F(v.freie_plaetze)}</td>
      <td class="r">${eur(v.umsatz_gesamt)}</td>
      <td class="r" style="color:${dC(v.tickets_1d)}">${dF(v.tickets_1d)}</td>
      <td class="r" style="color:${dC(v.tickets_3d)}">${dF(v.tickets_3d)}</td>
      <td class="r" style="color:${dC(v.tickets_7d)}">${dF(v.tickets_7d)}</td>
      <td class="r" style="color:${dC(v.tickets_30d)}">${dF(v.tickets_30d)}</td>
      <td><span class="bdg ${vC}">${vL(v.vvk_phase)}</span></td>
      <td>${D(v.vvk_start)}</td>
      <td>${D(v.vvk_offiziell)}</td>
    </tr>`}).join('');
  return`<div class="panel l2-section" id="p-vadetail">
    <div class="sec-h">VA-Detail <span class="bdg bdg-b">Ebene 2</span></div>
    <div class="filters"><label>Produktion:</label><select id="fProdL2" onchange="fVAD()"><option value="">Alle</option>${opts}</select></div>
    <div class="tbl-wrap"><div class="tbl-head">Veranstaltungen — erweitert <span class="tbl-count">${a.length}</span></div>
    <div class="tbl-scroll"><table><thead><tr>
      <th>Produktion</th><th>Datum/Zeit</th><th class="r">Tage</th>
      <th class="r">KV</th><th class="r">Gesamt</th><th class="r">Kont.</th><th class="r">Kap.</th><th class="r">Frei VK</th>
      <th>Ausl. Ges.</th><th>Ausl. VK</th>
      <th class="r">Res.</th><th class="r">Frei</th><th class="r">Umsatz</th>
      <th class="r">1d</th><th class="r">3d</th><th class="r">7d</th><th class="r">30d</th>
      <th>VVK</th><th>VVK Start</th><th>VVK Offiziell</th>
    </tr></thead><tbody>${rows}</tbody></table></div></div>
  </div>`
}
function fVAD(){const p=$('#fProdL2').value;$$('.vad-row').forEach(r=>r.style.display=(!p||r.dataset.p===p)?'':'none')}

function bProds(){
  const activeProdNames=new Set(aVA.map(v=>v.produktion));
  const p=[...(DATA.produktionen||[])].filter(x=>activeProdNames.has(x.name)).sort((a,b)=>(b.auslastung_pct||0)-(a.auslastung_pct||0));
  const rows=p.map(x=>{const tk=x.tickets_kartenverkauf!=null?x.tickets_kartenverkauf:x.tickets_gesamt;return`<tr><td class="t">${x.name}</td><td class="r">${x.anzahl_veranstaltungen}</td><td class="r">${F(tk)}</td><td class="r">${F(x.kontingente||0)}</td><td class="r">${F(x.kapazitaet_gesamt)}</td><td>${bar(x.auslastung_pct)}</td><td class="r">${eur(x.umsatz_gesamt||0)}</td><td class="r" style="color:${dC(x.tickets_1d)}">${dF(x.tickets_1d||0)}</td><td class="r">${F(x.tickets_7d||0)}</td></tr>`}).join('');
  return`<div class="panel" id="p-prods"><div class="sec-h">Produktionen <span class="bdg bdg-m">${p.length}</span></div><div class="tbl-wrap"><div class="tbl-scroll"><table><thead><tr><th>Produktion</th><th class="r">VA</th><th class="r">KV</th><th class="r">Kont.</th><th class="r">Kap.</th><th>Auslastung</th><th class="r">Umsatz</th><th class="r">1d</th><th class="r">7d</th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="chart-box"><h3>Auslastung nach Produktion</h3><div class="chart-wrap"><canvas id="cProds"></canvas></div></div></div>`
}

// ── ZEITREIHE (L2) ──
function bTimeline(){
  const zr=DATA.zeitreihe_tagesverkauf||[];
  const rows=zr.map(d=>`<tr><td>${D(d.datum)}</td><td class="r" style="color:${d.tagesverkauf>0?'var(--green)':'var(--text-dim)'}">${F(d.tagesverkauf)}</td><td class="r">${F(d.kumuliert)}</td></tr>`).join('');
  return`<div class="panel l2-section" id="p-timeline"><div class="sec-h">Verkaufszeitreihe <span class="bdg bdg-b">Ebene 2</span></div><div class="chart-box"><h3>Tägliche Verkäufe</h3><div class="chart-wrap"><canvas id="cDaily"></canvas></div></div><div class="chart-box"><h3>Kumulierte Verkäufe</h3><div class="chart-wrap"><canvas id="cCum"></canvas></div></div><div class="tbl-wrap"><div class="tbl-head">Tagesdetails <span class="tbl-count">${zr.length} Tage</span></div><div class="tbl-scroll"><table><thead><tr><th>Datum</th><th class="r">Tagesverkauf</th><th class="r">Kumuliert</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`
}

// ── VERKAUFSMIX (L2) ──
function bMix(){
  const mix=DATA.verkaufsmix||[],byP={};mix.forEach(m=>{(byP[m.produktion]||(byP[m.produktion]=[])).push(m)});
  let tables='';Object.keys(byP).sort().forEach(prod=>{const items=byP[prod].sort((a,b)=>b.anzahl-a.anzahl),total=items.reduce((s,i)=>s+i.anzahl,0);const rows=items.map(i=>{const p=total>0?(i.anzahl/total*100):0;return`<tr><td class="t">${i.verkaufsart}</td><td class="r">${F(i.anzahl)}</td><td>${bar(p)}</td></tr>`}).join('');tables+=`<div class="tbl-wrap"><div class="tbl-head">${prod} <span class="tbl-count">${F(total)} Tickets</span></div><div class="tbl-scroll"><table><thead><tr><th>Verkaufsart</th><th class="r">Anzahl</th><th>Anteil</th></tr></thead><tbody>${rows}</tbody></table></div></div>`});
  return`<div class="panel l2-section" id="p-mix"><div class="sec-h">Verkaufsmix <span class="bdg bdg-b">Ebene 2</span></div><div class="chart-box"><h3>Top Verkaufsarten (gesamt)</h3><div class="chart-wrap"><canvas id="cMix"></canvas></div></div>${tables}</div>`
}

// ── VALIDIERUNG (L2) ──
function bValid(){
  const vals=(DATA.validierung||[]).map(v=>`<div class="alert alert-warn">⚠ ${v}</div>`).join('')||'<div class="alert alert-ok">✓ Keine Abweichungen</div>';
  const warns=(DATA.vvk_warnungen||[]).length?DATA.vvk_warnungen.map(w=>{if(typeof w==='string')return`<div class="alert alert-info">ℹ ${w}</div>`;return`<div class="alert alert-info">ℹ VA ${w.va_nr} (${w.va_name||''}): ${w.typ||''} — Erster VK: ${D(w.first_seen)}, Erwartet: ${D(w.expected_vvk)}</div>`}).join(''):'<div style="color:var(--text-dim);font-size:12px;padding:8px;">Keine VVK-Warnungen.</div>';
  const m=DATA.meta;
  return`<div class="panel l2-section" id="p-valid"><div class="sec-h">Validierung <span class="bdg bdg-b">Ebene 2</span></div><div class="alerts">${vals}</div><div class="sec-h" style="font-size:13px;margin-top:20px;">VVK-Warnungen</div><div class="alerts">${warns}</div><div class="sec-h" style="font-size:13px;margin-top:20px;">Meta</div><div class="kpi-row"><div class="kpi"><div class="kpi-label">Erstellt</div><div class="kpi-val" style="font-size:14px">${m.erstellt||'–'}</div></div><div class="kpi"><div class="kpi-label">Snapshots</div><div class="kpi-val">${m.anzahl_snapshots}</div><div class="kpi-sub">${m.snapshot_zeitraum}</div></div><div class="kpi"><div class="kpi-label">VA</div><div class="kpi-val">${m.gesamt_veranstaltungen}</div></div><div class="kpi"><div class="kpi-label">Produktionen</div><div class="kpi-val">${m.gesamt_produktionen}</div></div></div></div>`
}

// ── CHARTS ──
function initCharts(){
  Chart.defaults.color='#5a5a72';Chart.defaults.borderColor='#d8d8e2';Chart.defaults.font.family="Arial,Helvetica,sans-serif";Chart.defaults.font.size=11;
  const cP=document.getElementById('cProds');
  if(cP&&!cP._done){const activeProdNames=new Set(aVA.map(v=>v.produktion));const prods=[...(DATA.produktionen||[])].filter(x=>activeProdNames.has(x.name)).sort((a,b)=>(b.auslastung_pct||0)-(a.auslastung_pct||0));new Chart(cP,{type:'bar',data:{labels:prods.map(p=>p.name.length>22?p.name.slice(0,20)+'…':p.name),datasets:[{data:prods.map(p=>p.auslastung_pct||0),backgroundColor:prods.map(p=>pC(p.auslastung_pct||0)),borderRadius:3,barThickness:18}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{max:100,grid:{color:'#e6e6ee'}},y:{grid:{display:false}}}}});cP._done=true}
  const cD=document.getElementById('cDaily');
  if(cD&&!cD._done){const zr=DATA.zeitreihe_tagesverkauf||[];new Chart(cD,{type:'bar',data:{labels:zr.map(d=>D(d.datum)),datasets:[{data:zr.map(d=>d.tagesverkauf),backgroundColor:'rgba(139,105,20,0.35)',borderRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxRotation:45}},y:{grid:{color:'#e6e6ee'}}}}});cD._done=true}
  const cC=document.getElementById('cCum');
  if(cC&&!cC._done){const zr=DATA.zeitreihe_tagesverkauf||[];new Chart(cC,{type:'line',data:{labels:zr.map(d=>D(d.datum)),datasets:[{data:zr.map(d=>d.kumuliert),borderColor:'#8b6914',backgroundColor:'rgba(139,105,20,0.06)',fill:true,tension:0.3,pointRadius:2,pointHoverRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxRotation:45}},y:{grid:{color:'#e6e6ee'}}}}});cC._done=true}
  const cM=document.getElementById('cMix');
  if(cM&&!cM._done){const mix=DATA.verkaufsmix||[],byA={};mix.forEach(m=>byA[m.verkaufsart]=(byA[m.verkaufsart]||0)+m.anzahl);const sorted=Object.entries(byA).sort((a,b)=>b[1]-a[1]).slice(0,12);const clrs=['#8b6914','#2563eb','#16a34a','#b45309','#dc2626','#7c3aed','#db2777','#059669','#ea580c','#4f46e5','#c026d3','#0891b2'];new Chart(cM,{type:'doughnut',data:{labels:sorted.map(s=>s[0]),datasets:[{data:sorted.map(s=>s[1]),backgroundColor:clrs,borderColor:'#ffffff',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{boxWidth:10,padding:6,font:{size:10}}}}}});cM._done=true}
}
init();
</script>
</body>
</html>
