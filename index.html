<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schaubühne — Ticketing Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg: #0a0a0c; --surface: #131318; --surface-2: #1a1a22; --surface-3: #22222e;
    --border: #2a2a38; --border-light: #3a3a4a;
    --text: #e8e8f0; --text-muted: #8888a0; --text-dim: #5a5a72;
    --accent: #c8a96e; --accent-dim: #8a7248;
    --green: #4ade80; --green-dim: #166534;
    --red: #f87171; --red-dim: #7f1d1d;
    --yellow: #fbbf24; --yellow-dim: #78350f;
    --blue: #60a5fa; --blue-dim: #1e3a5f;
    --font: 'DM Sans', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
  .header { padding: 24px 32px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .header-left { display: flex; align-items: baseline; gap: 16px; }
  .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
  .header h1 span { color: var(--accent); font-weight: 300; }
  .header-meta { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
  .header-right { display: flex; gap: 12px; align-items: center; }
  .tabs { display: flex; gap: 2px; padding: 0 32px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .tab { padding: 12px 20px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; user-select: none; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab.level2 { display: none; }
  .tab.level2.show { display: block; }
  .main { padding: 24px 32px; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; }
  .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 6px; }
  .kpi-value { font-size: 28px; font-weight: 700; font-family: var(--mono); letter-spacing: -0.03em; color: var(--text); }
  .kpi-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-family: var(--mono); }
  .kpi-value.green { color: var(--green); }
  .kpi-value.red { color: var(--red); }
  .kpi-value.yellow { color: var(--yellow); }
  .kpi-value.accent { color: var(--accent); }
  .alerts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .alert { padding: 10px 16px; border-radius: 6px; font-size: 13px; display: flex; align-items: center; gap: 10px; }
  .alert-warn { background: var(--yellow-dim); border: 1px solid rgba(251,191,36,0.3); color: var(--yellow); }
  .alert-danger { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
  .alert-info { background: var(--blue-dim); border: 1px solid rgba(96,165,250,0.3); color: var(--blue); }
  .alert-success { background: var(--green-dim); border: 1px solid rgba(74,222,128,0.3); color: var(--green); }
  .alert-icon { font-size: 16px; flex-shrink: 0; }
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
  .table-title { padding: 14px 18px; font-size: 14px; font-weight: 600; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .table-title .count { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: var(--text-muted); }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; font-family: var(--mono); font-size: 12px; }
  td.text-cell { font-family: var(--font); font-size: 13px; }
  tr:hover { background: var(--surface-2); }
  tr:last-child td { border-bottom: none; }
  .num { text-align: right; }
  .pct-bar { display: inline-flex; align-items: center; gap: 8px; min-width: 120px; }
  .pct-bar-bg { flex: 1; height: 6px; background: var(--surface-3); border-radius: 3px; overflow: hidden; min-width: 60px; }
  .pct-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .pct-bar-val { font-size: 12px; font-family: var(--mono); min-width: 42px; text-align: right; }
  .detail-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
  .detail-overlay.open { display: flex; justify-content: flex-end; }
  .detail-panel { width: min(680px, 90vw); height: 100vh; background: var(--bg); border-left: 1px solid var(--border); overflow-y: auto; padding: 28px; animation: slideIn 0.25s ease; }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .detail-close { float: right; background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted); font-size: 18px; width: 36px; height: 36px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .detail-close:hover { color: var(--text); border-color: var(--border-light); }
  .detail-header { margin-bottom: 24px; }
  .detail-header h2 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .detail-header .meta { font-size: 13px; color: var(--text-muted); font-family: var(--mono); }
  .detail-section { margin-bottom: 20px; }
  .detail-section h3 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 24px; }
  .detail-item label { font-size: 11px; color: var(--text-dim); display: block; margin-bottom: 2px; }
  .detail-item span { font-size: 14px; font-family: var(--mono); font-weight: 500; }
  .chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px; }
  .chart-container h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .chart-canvas-wrap { position: relative; height: 300px; }
  .chart-canvas-wrap canvas { width: 100% !important; height: 100% !important; }
  .section-header { font-size: 16px; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .section-header .badge { font-size: 11px; font-family: var(--mono); padding: 2px 8px; border-radius: 4px; background: var(--surface-3); color: var(--text-dim); }
  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .filter-bar select, .filter-bar input { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 8px 12px; font-size: 13px; font-family: var(--font); }
  .filter-bar select:focus, .filter-bar input:focus { outline: none; border-color: var(--accent); }
  .filter-bar label { font-size: 12px; color: var(--text-dim); }
  .footer { padding: 24px 32px; border-top: 1px solid var(--border); text-align: center; font-size: 11px; color: var(--text-dim); cursor: default; user-select: none; }
  .badge-sm { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 3px; font-family: var(--mono); font-weight: 500; }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-red { background: var(--red-dim); color: var(--red); }
  .badge-yellow { background: var(--yellow-dim); color: var(--yellow); }
  .badge-blue { background: var(--blue-dim); color: var(--blue); }
  .badge-muted { background: var(--surface-3); color: var(--text-dim); }
  .level2-section { display: none; }
  .level2-section.show { display: block; }
  .pw-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); align-items: center; justify-content: center; }
  .pw-overlay.open { display: flex; }
  .pw-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: min(380px, 90vw); text-align: center; }
  .pw-box h3 { font-size: 16px; margin-bottom: 8px; }
  .pw-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .pw-box input { width: 100%; padding: 10px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; font-family: var(--mono); margin-bottom: 12px; text-align: center; }
  .pw-box input:focus { outline: none; border-color: var(--accent); }
  .pw-box button { padding: 10px 24px; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; font-weight: 600; font-size: 14px; cursor: pointer; }
  .pw-box button:hover { opacity: 0.9; }
  .pw-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }
  .btn { padding: 7px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; color: var(--text-muted); font-size: 12px; cursor: pointer; font-family: var(--font); }
  .btn:hover { border-color: var(--border-light); color: var(--text); }
  @media print { body { background: #fff; color: #000; } .header, .tabs, .footer, .btn, .filter-bar { display: none; } .table-wrap, .kpi-card, .chart-container { border-color: #ddd; background: #fff; } td, th { color: #000; border-color: #ddd; } .kpi-value, .kpi-label, .kpi-sub { color: #000; } .pct-bar-bg { background: #eee; } }
  @media (max-width: 768px) { .header { padding: 16px; } .main { padding: 16px; } .tabs { padding: 0 16px; overflow-x: auto; } .kpi-row { grid-template-columns: repeat(2, 1fr); } table { font-size: 11px; } td, th { padding: 8px 10px; } .detail-panel { width: 100vw; } }
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; color: var(--text-dim); }
  .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--surface-3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="header"><div class="header-left"><h1>Schaubühne <span>Ticketing</span></h1><div class="header-meta" id="headerMeta">Lade Daten…</div></div><div class="header-right"><button class="btn" onclick="window.print()">⎙ Drucken</button></div></div>
<div class="tabs" id="tabBar"><div class="tab active" data-tab="overview">Übersicht</div><div class="tab" data-tab="events">Veranstaltungen</div><div class="tab" data-tab="productions">Produktionen</div><div class="tab level2" data-tab="timeline">Zeitreihe</div><div class="tab level2" data-tab="mix">Verkaufsmix</div><div class="tab level2" data-tab="validation">Validierung</div></div>
<div class="main" id="main"><div class="loading" id="loadingState"><div class="loading-spinner"></div><span>Dashboard-Daten werden geladen…</span></div></div>
<div class="detail-overlay" id="detailOverlay"><div class="detail-panel" id="detailPanel"></div></div>
<div class="pw-overlay" id="pwOverlay"><div class="pw-box"><h3>Erweiterte Ansicht</h3><p>Zugang nur für autorisierte Nutzer.</p><input type="password" id="pwInput" placeholder="Passwort eingeben" autofocus><br><button onclick="checkPassword()">Entsperren</button><div class="pw-error" id="pwError">Falsches Passwort.</div></div></div>
<div class="footer" id="footer">Schaubühne am Lehniner Platz · Ticketing Dashboard · Daten: EVENTIM.INHOUSE</div>
<script>
const PW_HASH='8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918';
let footerClicks=0,footerTimer=null,level2Unlocked=false,DATA=null;
async function loadData(){try{const r=await fetch('dashboard_data.json');if(!r.ok)throw new Error('Datei nicht gefunden');DATA=await r.json();initDashboard();}catch(e){document.getElementById('loadingState').innerHTML=`<div style="color:var(--red);text-align:center;"><div style="font-size:24px;margin-bottom:12px;">⚠</div><div style="font-size:14px;margin-bottom:8px;">dashboard_data.json konnte nicht geladen werden.</div><div style="font-size:12px;color:var(--text-dim);">${e.message}</div></div>`;}}
function fmt(n,d=0){if(n==null||isNaN(n))return'–';return Number(n).toLocaleString('de-DE',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtEur(n){if(n==null||isNaN(n))return'–';return Number(n).toLocaleString('de-DE',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtPct(n){if(n==null||isNaN(n))return'–';return fmt(n,1)+'%';}
function pctColor(v){if(v>=90)return'var(--green)';if(v>=70)return'var(--blue)';if(v>=50)return'var(--yellow)';return'var(--red)';}
function pctBar(val,label){const c=Math.min(Math.max(val||0,0),100);const col=pctColor(val||0);return`<div class="pct-bar"><div class="pct-bar-bg"><div class="pct-bar-fill" style="width:${c}%;background:${col}"></div></div><div class="pct-bar-val" style="color:${col}">${label||fmtPct(val)}</div></div>`;}
function dateFmt(d){if(!d)return'–';const p=d.split('-');return`${p[2]}.${p[1]}.${p[0]}`;}
function daysUntil(ds){const n=new Date();n.setHours(0,0,0,0);return Math.ceil((new Date(ds)-n)/86400000);}
function vvkPhaseLabel(p){return{foerderer:'Förderer',freundeskreis:'Freundeskreis',offiziell:'Offiziell'}[p]||p||'–';}
async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
function initDashboard(){document.getElementById('loadingState').style.display='none';const m=DATA.meta;document.getElementById('headerMeta').textContent=`Stand: ${dateFmt(m.aktuellster_snapshot)} · ${m.anzahl_snapshots} Snapshots · ${m.gesamt_veranstaltungen} VA · ${m.gesamt_produktionen} Produktionen`;renderOverview();renderEventsTab();renderProductionsTab();renderTimelineTab();renderMixTab();renderValidationTab();initTabs();initFooter();}
function initTabs(){document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));const el=document.getElementById('tab-'+t.dataset.tab);if(el)el.classList.add('active');});});}
function initFooter(){document.getElementById('footer').addEventListener('click',()=>{if(level2Unlocked)return;footerClicks++;clearTimeout(footerTimer);footerTimer=setTimeout(()=>{footerClicks=0;},2000);if(footerClicks>=5){footerClicks=0;document.getElementById('pwOverlay').classList.add('open');document.getElementById('pwInput').focus();}});document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPassword();});}
async function checkPassword(){const v=document.getElementById('pwInput').value;const h=await sha256(v);if(h===PW_HASH){level2Unlocked=true;document.getElementById('pwOverlay').classList.remove('open');document.querySelectorAll('.level2').forEach(el=>el.classList.add('show'));document.querySelectorAll('.level2-section').forEach(el=>el.classList.add('show'));}else{document.getElementById('pwError').style.display='block';document.getElementById('pwInput').value='';setTimeout(()=>{document.getElementById('pwError').style.display='none';},2000);}}
function renderOverview(){const vas=DATA.veranstaltungen||[];const today=new Date().toISOString().split('T')[0];const active=vas.filter(v=>v.datum>=today);const totalTickets=active.reduce((s,v)=>s+(v.tickets_gesamt||0),0);const totalKap=active.reduce((s,v)=>s+(v.kapazitaet||0),0);const totalUmsatz=active.reduce((s,v)=>s+(v.umsatz_gesamt||0),0);const totalKontingente=active.reduce((s,v)=>s+(v.kontingente||0),0);const totalFrei=active.reduce((s,v)=>s+(v.freie_plaetze||0),0);const totalReserviert=active.reduce((s,v)=>s+(v.reserviert||0),0);const avgAuslastung=totalKap>0?(totalTickets/totalKap*100):0;const tickets1d=active.reduce((s,v)=>s+(v.tickets_1d||0),0);const tickets7d=active.reduce((s,v)=>s+(v.tickets_7d||0),0);const alerts=[];active.forEach(v=>{const days=daysUntil(v.datum);if(days<=14&&(v.auslastung_gesamt_pct||0)<50)alerts.push({type:'danger',icon:'⚠',text:`${v.produktion} (${dateFmt(v.datum)}) — unter 50% Auslastung bei nur ${days} Tagen bis VA`});if((v.tickets_1d||0)>=20)alerts.push({type:'success',icon:'▲',text:`${v.produktion} (${dateFmt(v.datum)}) — ${v.tickets_1d} Tickets heute verkauft`});});const alertsHtml=alerts.length?`<div class="alerts">${alerts.map(a=>`<div class="alert alert-${a.type}"><span class="alert-icon">${a.icon}</span>${a.text}</div>`).join('')}</div>`:'';const html=`<div class="tab-content active" id="tab-overview"><div class="kpi-row"><div class="kpi-card"><div class="kpi-label">Aktive VA</div><div class="kpi-value">${active.length}</div><div class="kpi-sub">im Verkauf</div></div><div class="kpi-card"><div class="kpi-label">Tickets verkauft</div><div class="kpi-value accent">${fmt(totalTickets)}</div><div class="kpi-sub">von ${fmt(totalKap)} Kapazität</div></div><div class="kpi-card"><div class="kpi-label">⌀ Auslastung</div><div class="kpi-value" style="color:${pctColor(avgAuslastung)}">${fmtPct(avgAuslastung)}</div><div class="kpi-sub">Gesamt</div></div><div class="kpi-card"><div class="kpi-label">Umsatz</div><div class="kpi-value">${fmtEur(totalUmsatz)}</div><div class="kpi-sub">aktive VA</div></div><div class="kpi-card"><div class="kpi-label">Heute / 7 Tage</div><div class="kpi-value green">${fmt(tickets1d)} / ${fmt(tickets7d)}</div><div class="kpi-sub">Neuverkäufe</div></div><div class="kpi-card"><div class="kpi-label">Kontingente</div><div class="kpi-value">${fmt(totalKontingente)}</div><div class="kpi-sub">separat (nicht VK)</div></div><div class="kpi-card"><div class="kpi-label">Reserviert</div><div class="kpi-value yellow">${fmt(totalReserviert)}</div><div class="kpi-sub">nicht bezahlt</div></div><div class="kpi-card"><div class="kpi-label">Freie Plätze</div><div class="kpi-value">${fmt(totalFrei)}</div><div class="kpi-sub">noch verfügbar</div></div></div>${alertsHtml}${renderTopTable(active)}</div>`;document.getElementById('main').insertAdjacentHTML('beforeend',html);}
function renderTopTable(active){const sorted=[...active].sort((a,b)=>new Date(a.datum)-new Date(b.datum));const rows=sorted.map(v=>{const days=daysUntil(v.datum);const db=days<=7?'badge-red':days<=14?'badge-yellow':'badge-muted';return`<tr onclick="openDetail(${v.va_nr})" style="cursor:pointer;"><td class="text-cell">${v.produktion}</td><td>${dateFmt(v.datum)}</td><td>${v.uhrzeit||'–'}</td><td class="num"><span class="badge-sm ${db}">${days}d</span></td><td class="num">${fmt(v.tickets_gesamt)}</td><td class="num">${fmt(v.kapazitaet)}</td><td>${pctBar(v.auslastung_gesamt_pct)}</td><td class="num">${fmt(v.kontingente)}</td><td class="num">${fmt(v.reserviert)}</td><td class="num">${fmt(v.freie_plaetze)}</td><td class="num">${fmtEur(v.umsatz_gesamt)}</td><td class="num" style="color:${(v.tickets_1d||0)>0?'var(--green)':'var(--text-dim)'}">${fmt(v.tickets_1d)}</td><td class="num">${fmt(v.tickets_7d)}</td></tr>`;}).join('');return`<div class="table-wrap"><div class="table-title">Aktuelle Veranstaltungen <span class="count">${sorted.length} VA</span></div><div style="overflow-x:auto;"><table><thead><tr><th>Produktion</th><th>Datum</th><th>Zeit</th><th class="num">Tage</th><th class="num">Verkauft</th><th class="num">Kap.</th><th>Auslastung</th><th class="num">Konting.</th><th class="num">Reserv.</th><th class="num">Frei</th><th class="num">Umsatz</th><th class="num">1d</th><th class="num">7d</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;}
function renderEventsTab(){const vas=DATA.veranstaltungen||[];const today=new Date().toISOString().split('T')[0];const active=vas.filter(v=>v.datum>=today).sort((a,b)=>new Date(a.datum)-new Date(b.datum));const prods=[...new Set(active.map(v=>v.produktion))].sort();const fo=prods.map(p=>`<option value="${p}">${p}</option>`).join('');const rows=active.map(v=>{const days=daysUntil(v.datum);const db=days<=7?'badge-red':days<=14?'badge-yellow':'badge-muted';const vb=v.vvk_phase==='foerderer'?'badge-blue':v.vvk_phase==='freundeskreis'?'badge-yellow':'badge-green';const tk=v.tickets_kartenverkauf!=null?v.tickets_kartenverkauf:v.tickets_gesamt;return`<tr class="va-row" data-prod="${v.produktion}" onclick="openDetail(${v.va_nr})" style="cursor:pointer;"><td class="text-cell">${v.produktion}</td><td>${dateFmt(v.datum)} ${v.uhrzeit||''}</td><td class="num"><span class="badge-sm ${db}">${days}d</span></td><td class="num">${fmt(tk)} / ${fmt(v.kapazitaet)}</td><td>${pctBar(v.auslastung_gesamt_pct)}</td><td>${pctBar(v.auslastung_verkauf_pct,fmtPct(v.auslastung_verkauf_pct))}</td><td class="num">${fmt(v.kontingente)}</td><td class="num">${fmt(v.freie_plaetze)}</td><td class="num">${fmtEur(v.umsatz_gesamt)}</td><td class="num" style="color:${(v.tickets_1d||0)>0?'var(--green)':'var(--text-dim)'}">${fmt(v.tickets_1d)}</td><td class="num">${fmt(v.tickets_3d)}</td><td class="num">${fmt(v.tickets_7d)}</td><td><span class="badge-sm ${vb}">${vvkPhaseLabel(v.vvk_phase)}</span></td></tr>`;}).join('');const html=`<div class="tab-content" id="tab-events"><div class="filter-bar"><label>Produktion:</label><select id="filterProd" onchange="filterEvents()"><option value="">Alle</option>${fo}</select></div><div class="table-wrap"><div class="table-title">Alle Veranstaltungen im Verkauf <span class="count">${active.length}</span></div><div style="overflow-x:auto;"><table><thead><tr><th>Produktion</th><th>Datum / Zeit</th><th class="num">Tage</th><th class="num">KV / Kap.</th><th>Ausl. Gesamt</th><th>Ausl. VK</th><th class="num">Konting.</th><th class="num">Frei</th><th class="num">Umsatz</th><th class="num">1d</th><th class="num">3d</th><th class="num">7d</th><th>VVK</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`;document.getElementById('main').insertAdjacentHTML('beforeend',html);}
function filterEvents(){const p=document.getElementById('filterProd').value;document.querySelectorAll('.va-row').forEach(r=>{r.style.display=(!p||r.dataset.prod===p)?'':'none';});}
function openDetail(vaNr){const v=DATA.veranstaltungen.find(x=>x.va_nr===vaNr);if(!v)return;const days=daysUntil(v.datum);const tk=v.tickets_kartenverkauf!=null?v.tickets_kartenverkauf:v.tickets_gesamt;const pgRows=(v.platzgruppen||[]).map(pg=>`<tr><td>${pg.platzgruppe.toUpperCase()}</td><td class="num">${fmt(pg.verkauft)}</td><td class="num">${fmt(pg.kapazitaet)}</td><td>${pctBar(pg.auslastung_gesamt_pct)}</td><td class="num">${fmt(pg.kontingente)}</td><td class="num">${fmt(pg.reserviert)}</td><td class="num">${fmt(pg.frei_verkaufbar)}</td></tr>`).join('');document.getElementById('detailPanel').innerHTML=`<button class="detail-close" onclick="closeDetail()">✕</button><div class="detail-header"><h2>${v.produktion}</h2><div class="meta">${dateFmt(v.datum)} · ${v.uhrzeit||''} · VA-Nr. ${v.va_nr} · noch ${days} Tage</div></div><div class="detail-section"><h3>Kennzahlen</h3><div class="detail-grid"><div class="detail-item"><label>Kartenverkauf</label><span>${fmt(tk)}</span></div><div class="detail-item"><label>Kontingente</label><span>${fmt(v.kontingente)}</span></div><div class="detail-item"><label>Gesamt (inkl. Kont.)</label><span style="color:var(--text-muted)">${fmt(v.tickets_gesamt)}</span></div><div class="detail-item"><label>Kapazität</label><span>${fmt(v.kapazitaet)}</span></div><div class="detail-item"><label>Auslastung (Gesamt)</label><span style="color:${pctColor(v.auslastung_gesamt_pct)}">${fmtPct(v.auslastung_gesamt_pct)}</span></div><div class="detail-item"><label>Auslastung (VK)</label><span style="color:${pctColor(v.auslastung_verkauf_pct)}">${fmtPct(v.auslastung_verkauf_pct)}</span></div><div class="detail-item"><label>Umsatz</label><span>${fmtEur(v.umsatz_gesamt)}</span></div><div class="detail-item"><label>Reserviert</label><span>${fmt(v.reserviert)}</span></div><div class="detail-item"><label>Freie Plätze</label><span>${fmt(v.freie_plaetze)}</span></div></div></div><div class="detail-section"><h3>Verkaufsdynamik</h3><div class="detail-grid"><div class="detail-item"><label>Heute (1d)</label><span style="color:${(v.tickets_1d||0)>0?'var(--green)':'var(--text-dim)'}">${fmt(v.tickets_1d)}</span></div><div class="detail-item"><label>3 Tage</label><span>${fmt(v.tickets_3d)}</span></div><div class="detail-item"><label>7 Tage</label><span>${fmt(v.tickets_7d)}</span></div><div class="detail-item"><label>30 Tage</label><span>${fmt(v.tickets_30d)}</span></div></div></div><div class="detail-section"><h3>VVK-Info</h3><div class="detail-grid"><div class="detail-item"><label>VVK-Start</label><span>${dateFmt(v.vvk_start)}</span></div><div class="detail-item"><label>VVK-Phase</label><span>${vvkPhaseLabel(v.vvk_phase)}</span></div><div class="detail-item"><label>VVK offiziell</label><span>${dateFmt(v.vvk_offiziell)}</span></div></div></div><div class="detail-section"><h3>Platzgruppen</h3><div style="overflow-x:auto;"><table><thead><tr><th>PG</th><th class="num">Verkauft</th><th class="num">Kap.</th><th>Auslastung</th><th class="num">Konting.</th><th class="num">Reserv.</th><th class="num">Frei VK</th></tr></thead><tbody>${pgRows}</tbody></table></div></div>`;document.getElementById('detailOverlay').classList.add('open');document.addEventListener('keydown',escDetail);}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('open');document.removeEventListener('keydown',escDetail);}
function escDetail(e){if(e.key==='Escape')closeDetail();}
function renderProductionsTab(){const prods=DATA.produktionen||[];const sorted=[...prods].sort((a,b)=>(b.auslastung_pct||0)-(a.auslastung_pct||0));const rows=sorted.map(p=>{const tk=p.tickets_kartenverkauf!=null?p.tickets_kartenverkauf:p.tickets_gesamt;return`<tr><td class="text-cell">${p.name}</td><td class="num">${p.anzahl_veranstaltungen}</td><td class="num">${fmt(tk)}</td><td class="num">${fmt(p.kontingente||0)}</td><td class="num">${fmt(p.kapazitaet_gesamt)}</td><td>${pctBar(p.auslastung_pct)}</td></tr>`;}).join('');const html=`<div class="tab-content" id="tab-productions"><div class="section-header">Produktionen <span class="badge">${sorted.length}</span></div><div class="table-wrap"><div style="overflow-x:auto;"><table><thead><tr><th>Produktion</th><th class="num">VA</th><th class="num">KV</th><th class="num">Kont.</th><th class="num">Kap.</th><th>Auslastung</th></tr></thead><tbody>${rows}</tbody></table></div></div><div class="chart-container"><h3>Auslastung nach Produktion</h3><div class="chart-canvas-wrap"><canvas id="chartProductions"></canvas></div></div></div>`;document.getElementById('main').insertAdjacentHTML('beforeend',html);}
function renderTimelineTab(){const zr=DATA.zeitreihe_tagesverkauf||[];const html=`<div class="tab-content level2-section" id="tab-timeline"><div class="section-header">Verkaufszeitreihe <span class="badge">Ebene 2</span></div><div class="chart-container"><h3>Tägliche Verkäufe</h3><div class="chart-canvas-wrap"><canvas id="chartDaily"></canvas></div></div><div class="chart-container"><h3>Kumulierte Verkäufe</h3><div class="chart-canvas-wrap"><canvas id="chartCumulative"></canvas></div></div><div class="table-wrap"><div class="table-title">Tagesdetails <span class="count">${zr.length} Tage</span></div><div style="overflow-x:auto;"><table><thead><tr><th>Datum</th><th class="num">Tagesverkauf</th><th class="num">Kumuliert</th></tr></thead><tbody>${zr.map(d=>`<tr><td>${dateFmt(d.datum)}</td><td class="num" style="color:${d.tagesverkauf>0?'var(--green)':'var(--text-dim)'}">${fmt(d.tagesverkauf)}</td><td class="num">${fmt(d.kumuliert)}</td></tr>`).join('')}</tbody></table></div></div></div>`;document.getElementById('main').insertAdjacentHTML('beforeend',html);}
function renderMixTab(){const mix=DATA.verkaufsmix||[];const byProd={};mix.forEach(m=>{if(!byProd[m.produktion])byProd[m.produktion]=[];byProd[m.produktion].push(m);});let tables='';Object.keys(byProd).sort().forEach(prod=>{const items=byProd[prod].sort((a,b)=>b.anzahl-a.anzahl);const total=items.reduce((s,i)=>s+i.anzahl,0);const rows=items.map(i=>{const pct=total>0?(i.anzahl/total*100):0;return`<tr><td class="text-cell">${i.verkaufsart}</td><td class="num">${fmt(i.anzahl)}</td><td>${pctBar(pct)}</td></tr>`;}).join('');tables+=`<div class="table-wrap"><div class="table-title">${prod} <span class="count">${fmt(total)} Tickets</span></div><div style="overflow-x:auto;"><table><thead><tr><th>Verkaufsart</th><th class="num">Anzahl</th><th>Anteil</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;});const html=`<div class="tab-content level2-section" id="tab-mix"><div class="section-header">Verkaufsmix <span class="badge">Ebene 2</span></div><div class="chart-container"><h3>Verkaufsmix nach Produktion</h3><div class="chart-canvas-wrap"><canvas id="chartMix"></canvas></div></div>${tables}</div>`;document.getElementById('main').insertAdjacentHTML('beforeend',html);}
function renderValidationTab(){const vals=DATA.validierung||[];const warnings=DATA.vvk_warnungen||[];const valRows=vals.map(v=>`<div class="alert alert-warn"><span class="alert-icon">⚠</span>${v}</div>`).join('');const warnRows=warnings.length?warnings.map(w=>`<div class="alert alert-info"><span class="alert-icon">ℹ</span>${typeof w==='string'?w:JSON.stringify(w)}</div>`).join(''):'<div style="color:var(--text-dim);font-size:13px;padding:12px;">Keine VVK-Warnungen.</div>';const html=`<div class="tab-content level2-section" id="tab-validation"><div class="section-header">Validierung & Warnungen <span class="badge">Ebene 2</span></div><div class="section-header" style="font-size:14px;border-color:var(--border);">Datenvalidierung</div><div class="alerts">${valRows||'<div style="color:var(--green);font-size:13px;padding:12px;">✓ Keine Abweichungen.</div>'}</div><div class="section-header" style="font-size:14px;border-color:var(--border);margin-top:24px;">VVK-Warnungen</div><div class="alerts">${warnRows}</div><div class="section-header" style="font-size:14px;border-color:var(--border);margin-top:24px;">Meta-Information</div><div class="kpi-row"><div class="kpi-card"><div class="kpi-label">Erstellt</div><div class="kpi-value" style="font-size:16px;">${DATA.meta.erstellt||'–'}</div></div><div class="kpi-card"><div class="kpi-label">Snapshots</div><div class="kpi-value">${DATA.meta.anzahl_snapshots}</div><div class="kpi-sub">${DATA.meta.snapshot_zeitraum}</div></div><div class="kpi-card"><div class="kpi-label">Veranstaltungen</div><div class="kpi-value">${DATA.meta.gesamt_veranstaltungen}</div></div><div class="kpi-card"><div class="kpi-label">Produktionen</div><div class="kpi-value">${DATA.meta.gesamt_produktionen}</div></div></div></div>`;document.getElementById('main').insertAdjacentHTML('beforeend',html);}
function initCharts(){Chart.defaults.color='#8888a0';Chart.defaults.borderColor='#2a2a38';Chart.defaults.font.family="'DM Sans',sans-serif";Chart.defaults.font.size=11;renderProductionsChart();renderDailyChart();renderCumulativeChart();renderMixChart();}
function renderProductionsChart(){const el=document.getElementById('chartProductions');if(!el)return;const prods=[...(DATA.produktionen||[])].sort((a,b)=>(b.auslastung_pct||0)-(a.auslastung_pct||0));new Chart(el,{type:'bar',data:{labels:prods.map(p=>p.name.length>20?p.name.slice(0,18)+'…':p.name),datasets:[{label:'Auslastung %',data:prods.map(p=>p.auslastung_pct||0),backgroundColor:prods.map(p=>pctColor(p.auslastung_pct||0)),borderRadius:4,barThickness:20}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{max:100,grid:{color:'#1a1a22'}},y:{grid:{display:false}}}}});}
function renderDailyChart(){const el=document.getElementById('chartDaily');if(!el)return;const zr=DATA.zeitreihe_tagesverkauf||[];new Chart(el,{type:'bar',data:{labels:zr.map(d=>dateFmt(d.datum)),datasets:[{label:'Tagesverkauf',data:zr.map(d=>d.tagesverkauf),backgroundColor:'rgba(200,169,110,0.6)',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxRotation:45}},y:{grid:{color:'#1a1a22'}}}}});}
function renderCumulativeChart(){const el=document.getElementById('chartCumulative');if(!el)return;const zr=DATA.zeitreihe_tagesverkauf||[];new Chart(el,{type:'line',data:{labels:zr.map(d=>dateFmt(d.datum)),datasets:[{label:'Kumuliert',data:zr.map(d=>d.kumuliert),borderColor:'#c8a96e',backgroundColor:'rgba(200,169,110,0.1)',fill:true,tension:0.3,pointRadius:2,pointHoverRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{maxRotation:45}},y:{grid:{color:'#1a1a22'}}}}});}
function renderMixChart(){const el=document.getElementById('chartMix');if(!el)return;const mix=DATA.verkaufsmix||[];const byArt={};mix.forEach(m=>{byArt[m.verkaufsart]=(byArt[m.verkaufsart]||0)+m.anzahl;});const sorted=Object.entries(byArt).sort((a,b)=>b[1]-a[1]).slice(0,15);const colors=['#c8a96e','#60a5fa','#4ade80','#fbbf24','#f87171','#a78bfa','#f472b6','#34d399','#fb923c','#818cf8','#e879f9','#22d3ee','#84cc16','#f43f5e','#06b6d4'];new Chart(el,{type:'doughnut',data:{labels:sorted.map(s=>s[0]),datasets:[{data:sorted.map(s=>s[1]),backgroundColor:colors,borderColor:'#131318',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{boxWidth:12,padding:8,font:{size:11}}}}}});}
document.getElementById('detailOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('detailOverlay'))closeDetail();});
document.getElementById('pwOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('pwOverlay'))document.getElementById('pwOverlay').classList.remove('open');});
loadData().then(()=>{setTimeout(initCharts,100);});
</script>
</body>
</html>
